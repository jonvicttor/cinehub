# Nome da Aplicacao
spring.application.name=cinehub

# ==========================================
# CONFIGURACOES DO BANCO DE DADOS (SUPABASE)
# ==========================================
spring.datasource.url=jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.rlbtqqhuceebtowrvsvk
# A senha sera lida das variaveis de ambiente do Render por seguranca
spring.datasource.password=${DB_PASSWORD}

# ==========================================
# CONFIGURACOES DO HIBERNATE (JPA)
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIGURACOES DA API DO TMDB
# ==========================================
tmdb.api.url=https://api.themoviedb.org/3
# As chaves serao lidas das variaveis de ambiente do Render por seguranca
tmdb.api.token=${TMDB_API_TOKEN}
tmdb.api.key=${TMDB_API_KEY}

# ==========================================
# CONFIGURACOES DO SERVIDOR (RENDER)
# ==========================================
# Diz ao Spring para usar a porta que o Render definir, ou 8080 local
server.port=${PORT:8080}