<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinehub - Lista Completa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-primaria: #a333ff; /* Roxo neon moderno */
            --cor-primaria-glow: rgba(163, 51, 255, 0.4);
            --cor-fundo: #0a0c0f;
            --cor-card: #15191e;
            --cor-texto: #ffffff;
            --cor-texto-sec: #94a3b8;
            --cor-sucesso: #21d07a;
            --cor-alerta: #d2d531;
            --cor-perigo: #db2360;
            --cor-borda: rgba(255, 255, 255, 0.08);
            --transicao: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0;}

        body {
            background-color: var(--cor-fundo); color: var(--cor-texto);
            font-family: 'Inter', sans-serif; padding-bottom: 120px; /* Espaço para o novo menu */
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* ======= HEADER E BRANDING PREMIUM ======= */
        .header-top {
            width: 100%; max-width: 1200px; padding: 40px 20px 20px 20px;
            display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 10px;
        }

        .brand { text-decoration: none; transition: var(--transicao); display: flex; align-items: center; }
        .brand:hover { transform: scale(1.02); }
        .brand-text { font-size: 2.8rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin: 0; color: #ffffff; }
        .brand-text span { font-weight: 800; background: linear-gradient(135deg, #fff 10%, var(--cor-primaria) 90%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-left: 5px; }

        /* CONTAINER DA PÁGINA */
        .page-container { width: 100%; max-width: 1200px; padding: 0 20px; }

        /* CABEÇALHO DA CATEGORIA */
        .categoria-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; margin-top: 10px;}
        .btn-voltar {
            background: rgba(255,255,255,0.05); border: 1px solid var(--cor-borda); color: #fff;
            padding: 10px 20px; border-radius: 30px; font-size: 0.85rem; font-weight: 700;
            cursor: pointer; transition: var(--transicao); backdrop-filter: blur(10px);
        }
        .btn-voltar:hover { background: rgba(255,255,255,0.1); border-color: var(--cor-primaria); transform: translateX(-3px); }
        .categoria-titulo { font-size: 1.6rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }

        /* GRID DE FILMES (Matemática mantida com visual novo) */
        .grid-filmes {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-bottom: 40px;
        }

        /* ======= CARD TMDB COMPLETO PREMIUM ======= */
        .card-tmdb {
            display: flex; flex-direction: column; cursor: pointer; position: relative;
            border-radius: 12px; background-color: var(--cor-card);
            border: 1px solid var(--cor-borda); transition: var(--transicao); overflow: visible;
        }
        .card-tmdb:hover { transform: translateY(-10px); border-color: var(--cor-primaria); box-shadow: 0 15px 40px rgba(0,0,0,0.6); }

        .poster-container { position: relative; width: 100%; border-radius: 10px; overflow: hidden; pointer-events: none; }
        .poster-container img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background-color: #232a31;}

        /* NOTA INTEGRADA NO CARD FLUTUANTE */
        .nota-donut {
            position: absolute; bottom: 75px; left: 10px; width: 38px; height: 38px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 0.75rem; font-weight: 800; box-shadow: 0 0 10px rgba(0,0,0,0.8);
            background: conic-gradient(var(--cor-anel) var(--progresso, 0%), rgba(255,255,255,0.1) var(--progresso, 0%));
            z-index: 5;
        }
        .nota-donut::after { content: ""; position: absolute; inset: 3px; background-color: #081c22; border-radius: 50%; z-index: -1; }
        .nota-donut span { z-index: 6; position: relative; display: flex; }
        .simbolo-porcento { font-size: 0.4rem; margin-top: 2px; }

        /* INFO CONTAINER */
        .info-container { padding: 32px 10px 15px 10px; flex-grow: 1; display: flex; flex-direction: column; gap: 4px; justify-content: flex-start; }
        .info-titulo { font-size: 0.95rem; font-weight: 700; margin: 0; color: #fff; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; pointer-events: none; }
        .info-data { font-size: 0.8rem; color: var(--cor-texto-sec); margin: 0; pointer-events: none; }

        /* BOTÃO CARREGAR MAIS PREMIUM */
        .btn-carregar-mais {
            width: 100%; padding: 18px; background-color: rgba(163, 51, 255, 0.1); color: #fff;
            border: 1px dashed var(--cor-primaria); border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer;
            transition: var(--transicao); margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase;
        }
        .btn-carregar-mais:hover { background-color: var(--cor-primaria); border-style: solid; box-shadow: 0 10px 25px var(--cor-primaria-glow); transform: translateY(-3px); }
        .btn-carregar-mais:disabled { opacity: 0.5; cursor: not-allowed; transform: none; border-style: dashed; background-color: rgba(255,255,255,0.05); border-color: var(--cor-borda); color: var(--cor-texto-sec);}

        /* ======= NAV BOTTOM GLASS ======= */
        .nav-bottom {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px;
            background: rgba(21, 25, 30, 0.7); backdrop-filter: blur(25px);
            border: 1px solid var(--cor-borda); border-radius: 40px;
            display: flex; justify-content: space-around; padding: 15px 10px;
            z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .nav-bottom a { color: var(--cor-texto-sec); text-decoration: none; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: var(--transicao); }
        .nav-bottom a.active { color: var(--cor-primaria); }
        .nav-icon { font-size: 1.4rem; }
    </style>
</head>
<body>

<div class="header-top">
    <a href="index.html" class="brand">
        <h1 class="brand-text">CINE<span>HUB</span></h1>
    </a>
</div>

<div class="page-container">
    <div class="categoria-header">
        <button class="btn-voltar" onclick="window.history.back()">← Voltar</button>
        <h2 class="categoria-titulo" id="titulo-pagina">Carregando...</h2>
    </div>

    <div class="grid-filmes" id="grid-lista">
        <p style="color: var(--cor-texto-sec); padding: 20px;">Buscando filmes no servidor...</p>
    </div>

    <button class="btn-carregar-mais" onclick="carregarMais()" id="btn-mais" style="display: none;">Carregar mais</button>
</div>

<nav class="nav-bottom">
    <a href="index.html" class="active"><span class="nav-icon">🔍</span>Home</a>
    <a href="library.html"><span class="nav-icon">📖</span>Library</a>
    <a href="calendario.html"><span class="nav-icon">📅</span>Agenda</a>
    <a href="comunidade.html"><span class="nav-icon">👥</span>Social</a>
    <a href="perfil.html"><span class="nav-icon">⚙️</span>Perfil</a>
</nav>

<script>
    const dadosUser = JSON.parse(localStorage.getItem('usuarioLogado'));
    if (dadosUser && dadosUser.corTema) { document.documentElement.style.setProperty('--cor-primaria', dadosUser.corTema); }
    if (!dadosUser) window.location.href = 'login.html';

    const placeholderImagem = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='500' height='750' style='background:%231b2228'%3E%3Ctext fill='%238c9baf' x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='24'%3ESem Foto%3C/text%3E%3C/svg%3E";

    // Variáveis de controle
    let categoriaAtual = '';
    let tipoAtual = '';
    let paginaAtual = 1;

    // >>> O SEGREDO DO SUCESSO: A SALA DE ESPERA (BUFFER) MANTIDO INTACTO <<<
    let filmesBuffer = [];

    window.onload = async function() {
        const urlParams = new URLSearchParams(window.location.search);
        categoriaAtual = urlParams.get('cat');
        tipoAtual = urlParams.get('tipo');

        if (!categoriaAtual || !tipoAtual) {
            window.location.href = 'index.html';
            return;
        }

        configurarTitulo();
        await buscarLista(true);
    };

    function configurarTitulo() {
        const titulos = {
            'popular_movie': 'Filmes Populares',
            'popular_tv': 'Séries Populares',
            'upcoming_movie': 'Próximas Estreias',
            'now_playing_movie': 'Filmes em Cartaz',
            'top_rated_movie': 'Filmes mais bem avaliados',
            'top_rated_tv': 'Séries mais bem avaliadas'
        };
        const chave = `${categoriaAtual}_${tipoAtual}`;
        document.getElementById('titulo-pagina').innerText = titulos[chave] || 'Lista Completa';
    }

    function formatarData(dataString) {
        if (!dataString) return '';
        const meses = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
        const partes = dataString.split('-');
        if (partes.length !== 3) return dataString;
        return `${partes[2]} de ${meses[parseInt(partes[1]) - 1]} de ${partes[0]}`;
    }

    // Função que lê a largura da tela para saber quantas colunas cabem
    function getNumeroColunas() {
        const grid = document.getElementById('grid-lista');
        const gridComputedStyle = window.getComputedStyle(grid);
        return gridComputedStyle.getPropertyValue("grid-template-columns").split(" ").length;
    }

    async function buscarLista(isNovaBusca = false) {
        const grid = document.getElementById('grid-lista');
        const btnMais = document.getElementById('btn-mais');

        if (isNovaBusca) {
            paginaAtual = 1;
            filmesBuffer = []; // Limpa a sala de espera
            grid.innerHTML = '<p style="color: var(--cor-texto-sec); padding: 20px;">Buscando filmes no servidor...</p>';
            btnMais.style.display = 'none';
        } else {
            btnMais.innerText = 'Carregando...';
            btnMais.disabled = true;
        }

        try {
            const response = await fetch(`/api/tmdb/lista?cat=${categoriaAtual}&tipo=${tipoAtual}&page=${paginaAtual}`);
            let novosFilmes = await response.json();

            if (categoriaAtual === 'upcoming') {
                novosFilmes.sort((a, b) => {
                    if (!a.dataExibicao) return 1;
                    if (!b.dataExibicao) return -1;
                    return new Date(a.dataExibicao) - new Date(b.dataExibicao);
                });
            }

            if (isNovaBusca) {
                grid.innerHTML = '';
            }

            // Junta os filmes novos com os que estavam na sala de espera
            filmesBuffer = filmesBuffer.concat(novosFilmes);

            // Descobre quantas colunas tem na tela agora
            const qtdColunas = getNumeroColunas();

            // Calcula o maior número múltiplo de colunas possível
            let limite = Math.floor(filmesBuffer.length / qtdColunas) * qtdColunas;

            // Se o TMDB mandou menos de 20 filmes, a lista acabou, então exibe tudo que tem.
            if (novosFilmes.length < 20) {
                limite = filmesBuffer.length;
            }

            // Pega exatamente a quantidade para fechar as linhas completas
            const filmesParaRenderizar = filmesBuffer.slice(0, limite);

            // O que sobrar (se não der uma linha cheia) volta pra sala de espera
            filmesBuffer = filmesBuffer.slice(limite);

            if (filmesParaRenderizar.length === 0 && isNovaBusca && filmesBuffer.length === 0) {
                grid.innerHTML = '<p style="color: var(--cor-texto-sec); padding: 20px;">Nenhum título encontrado.</p>';
                return;
            }

            // Manda pra tela!
            const htmlCards = gerarHTMLCards(filmesParaRenderizar);
            grid.insertAdjacentHTML('beforeend', htmlCards);

            // Controla o botão
            if (novosFilmes.length >= 20 || filmesBuffer.length > 0) {
                btnMais.style.display = 'block';
                btnMais.innerText = 'CARREGAR MAIS';
                btnMais.disabled = false;
            } else {
                btnMais.style.display = 'none';
            }

        } catch (e) {
            console.error(e);
            if (isNovaBusca) grid.innerHTML = '<p style="color: var(--cor-perigo); padding: 20px;">Erro ao carregar a lista do servidor.</p>';
            btnMais.innerText = 'Tentar novamente';
            btnMais.disabled = false;
        }
    }

    function carregarMais() {
        paginaAtual++;
        buscarLista(false);
    }

    function gerarHTMLCards(filmes) {
        return filmes.map(filme => {
            let valorNota = filme.notaTmdb || filme.vote_average || filme.voteAverage || 0;
            const porcentagemNum = valorNota > 0 ? (valorNota * 10).toFixed(0) : 0;

            let corAnel = 'var(--cor-sucesso)';
            if (valorNota < 7) corAnel = 'var(--cor-alerta)';
            if (valorNota < 5 && valorNota > 0) corAnel = 'var(--cor-perigo)';
            if (valorNota === 0) corAnel = '#666';

            // Ajustado para manter o padrão das outras telas
            let conteudoNota = porcentagemNum > 0 ? `<span>${porcentagemNum}<span class="simbolo-porcento">%</span></span>` : 'NR';

            const dataFormatada = formatarData(filme.dataExibicao);

            return `
                <div class="card-tmdb" onclick="window.location.href='detalhes.html?id=${filme.id}'">
                    <div class="poster-container">
                        <img src="${filme.linkPoster ? filme.linkPoster : placeholderImagem}" alt="${filme.tituloExibicao}" onerror="this.src='${placeholderImagem}'" draggable="false">
                    </div>
                    <div class="nota-donut" style="--cor-anel: ${corAnel}; --progresso: ${porcentagemNum}%">
                        ${conteudoNota}
                    </div>
                    <div class="info-container">
                        <h3 class="info-titulo" title="${filme.tituloExibicao}">${filme.tituloExibicao}</h3>
                        <p class="info-data">${dataFormatada}</p>
                    </div>
                </div>
            `;
        }).join('');
    }
</script>
</body>
</html>
