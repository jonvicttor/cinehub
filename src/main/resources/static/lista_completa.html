<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinehub - Lista Completa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-primaria: #800080;
            --cor-fundo: #14181c;
            --cor-card: #1b2228;
            --cor-texto: #ffffff;
            --cor-texto-sec: #8c9baf;
            --cor-sucesso: #21d07a;
            --cor-alerta: #d2d531;
            --cor-perigo: #db2360;
            --cor-borda: rgba(255, 255, 255, 0.1);
            --transicao: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0;}

        body {
            background-color: var(--cor-fundo); color: var(--cor-texto);
            font-family: 'Inter', sans-serif; padding-bottom: 90px;
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER PROFISSIONAL */
        .header-top {
            width: 100%; max-width: 1200px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 10px;
        }
        .brand { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; color: var(--cor-primaria); text-decoration: none;}

        /* CONTAINER DA PÁGINA */
        .page-container {
            width: 100%; max-width: 1200px; padding: 0 20px;
        }

        /* CABEÇALHO DA CATEGORIA */
        .categoria-header {
            display: flex; align-items: center; gap: 15px; margin-bottom: 25px;
        }
        .btn-voltar {
            background: transparent; border: 1px solid var(--cor-texto-sec); color: var(--cor-texto-sec);
            padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: var(--transicao);
        }
        .btn-voltar:hover { color: #fff; border-color: #fff; }
        .categoria-titulo { font-size: 1.5rem; font-weight: 800; color: #fff; }

        /* GRID DE FILMES (Estilo TMDB) */
        .grid-filmes {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; margin-bottom: 40px;
        }

        /* CARD TMDB COMPLETO */
        .card-tmdb {
            display: flex; flex-direction: column; cursor: pointer; position: relative;
            border-radius: 8px; background-color: var(--cor-card);
            border: 1px solid rgba(255, 255, 255, 0.05); transition: var(--transicao); overflow: visible;
        }
        .card-tmdb:hover { transform: translateY(-8px) scale(1.02); border-color: var(--cor-primaria); box-shadow: 0 12px 30px rgba(128, 0, 128, 0.5); }

        .poster-container { position: relative; width: 100%; pointer-events: none; }
        .poster-container img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-top-left-radius: 8px; border-top-right-radius: 8px; display: block; background-color: #232a31;}

        /* NOTA INTEGRADA NO CARD */
        .nota-donut {
            position: absolute; bottom: -18px; left: 10px; width: 36px; height: 36px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 0.7rem; font-weight: 800; box-shadow: 0 0 0 2px #081c22;
            background: conic-gradient(
                var(--cor-anel) var(--progresso, 0%),
                rgba(255,255,255,0.1) var(--progresso, 0%)
            );
        }
        .nota-donut::after { content: ""; position: absolute; inset: 3px; background-color: #081c22; border-radius: 50%; }
        .nota-donut span { z-index: 2; position: relative; font-size: 0.7rem; display: flex;}
        .nota-donut .simbolo-porcento { font-size: 0.4rem; margin-top: 1px;}

        .info-container { padding: 25px 10px 12px 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        .info-titulo { font-size: 0.9rem; font-weight: 700; margin: 0 0 4px 0; color: #fff; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; pointer-events: none; }
        .info-data { font-size: 0.8rem; color: var(--cor-texto-sec); margin: 0; pointer-events: none; }

        /* BOTÃO CARREGAR MAIS */
        .btn-carregar-mais {
            width: 100%; padding: 15px; background-color: var(--cor-primaria); color: #fff;
            border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 800; cursor: pointer;
            transition: var(--transicao); margin-bottom: 30px;
        }
        .btn-carregar-mais:hover { background-color: #990099; transform: translateY(-2px); }

        /* NAV BOTTOM */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: rgba(27, 34, 40, 0.9); backdrop-filter: blur(12px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--cor-borda); z-index: 1000; border-top-left-radius: 20px; border-top-right-radius: 20px; left: 50%; transform: translateX(-50%);}
        @media (min-width: 600px) { .nav-bottom { bottom: 20px; border-radius: 20px; border: 1px solid var(--cor-borda); } }
        .nav-bottom a { color: var(--cor-texto-sec); text-decoration: none; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: var(--transicao); }
        .nav-bottom a.active { color: var(--cor-primaria); }
        .nav-icon { font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="header-top">
    <a href="index.html" class="brand">🎬 CINEHUB</a>
</div>

<div class="page-container">
    <div class="categoria-header">
        <button class="btn-voltar" onclick="window.history.back()">← Voltar</button>
        <h2 class="categoria-titulo" id="titulo-pagina">Carregando...</h2>
    </div>

    <div class="grid-filmes" id="grid-lista">
        <p style="color: var(--cor-texto-sec); padding: 20px;">Buscando filmes no servidor...</p>
    </div>

    <button class="btn-carregar-mais" onclick="carregarMais()" id="btn-mais">Carregar mais</button>
</div>

<nav class="nav-bottom">
    <a href="index.html" class="active"><span class="nav-icon">🔍</span>Home</a>
    <a href="library.html"><span class="nav-icon">📖</span>Library</a>
    <a href="calendario.html"><span class="nav-icon">📅</span>Agenda</a>
    <a href="comunidade.html"><span class="nav-icon">👥</span>Social</a>
    <a href="perfil.html"><span class="nav-icon">⚙️</span>Perfil</a>
</nav>

<script>
    const dadosUser = JSON.parse(localStorage.getItem('usuarioLogado'));
    if (dadosUser && dadosUser.corTema) { document.documentElement.style.setProperty('--cor-primaria', dadosUser.corTema); }
    if (!dadosUser) window.location.href = 'login.html';

    const placeholderImagem = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='500' height='750' style='background:%231b2228'%3E%3Ctext fill='%238c9baf' x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='24'%3ESem Foto%3C/text%3E%3C/svg%3E";

    // Variáveis de controle
    let categoriaAtual = '';
    let tipoAtual = '';

    window.onload = async function() {
        const urlParams = new URLSearchParams(window.location.search);
        categoriaAtual = urlParams.get('cat');
        tipoAtual = urlParams.get('tipo');

        if (!categoriaAtual || !tipoAtual) {
            window.location.href = 'index.html';
            return;
        }

        configurarTitulo();
        await buscarLista();
    };

    function configurarTitulo() {
        const titulos = {
            'popular_movie': 'Filmes Populares',
            'popular_tv': 'Séries Populares',
            'upcoming_movie': 'Próximas Estreias',
            'now_playing_movie': 'Filmes em Cartaz',
            'top_rated_movie': 'Filmes mais bem avaliados',
            'top_rated_tv': 'Séries mais bem avaliadas'
        };
        const chave = `${categoriaAtual}_${tipoAtual}`;
        document.getElementById('titulo-pagina').innerText = titulos[chave] || 'Lista Completa';
    }

    function getDataDeHoje() {
        const hoje = new Date();
        const yyyy = hoje.getFullYear();
        const mm = String(hoje.getMonth() + 1).padStart(2, '0');
        const dd = String(hoje.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    function formatarData(dataString) {
        if (!dataString) return '';
        const meses = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
        const partes = dataString.split('-');
        if (partes.length !== 3) return dataString;
        return `${partes[2]} de ${meses[parseInt(partes[1]) - 1]} de ${partes[0]}`;
    }

    async function buscarLista() {
        const grid = document.getElementById('grid-lista');
        try {
            const response = await fetch(`/api/tmdb/lista?cat=${categoriaAtual}&tipo=${tipoAtual}`);
            let filmes = await response.json();

            // FILTRO DE PRÓXIMAS ESTREIAS: Só entra quem ainda não lançou!
            if (categoriaAtual === 'upcoming') {
                const dataHoje = getDataDeHoje();
                filmes = filmes.filter(f => f.dataExibicao && f.dataExibicao > dataHoje);
            }

            if (filmes.length === 0) {
                grid.innerHTML = '<p style="color: var(--cor-texto-sec); padding: 20px;">Nenhum título encontrado.</p>';
                return;
            }

            grid.innerHTML = gerarHTMLCards(filmes);

        } catch (e) {
            console.error(e);
            grid.innerHTML = '<p style="color: var(--cor-perigo); padding: 20px;">Erro ao carregar a lista do servidor.</p>';
        }
    }

    function gerarHTMLCards(filmes) {
        return filmes.map(filme => {
            let valorNota = filme.notaTmdb || filme.vote_average || filme.voteAverage || 0;
            const porcentagemNum = valorNota > 0 ? (valorNota * 10).toFixed(0) : 0;

            let corAnel = 'var(--cor-sucesso)';
            if (valorNota < 7) corAnel = 'var(--cor-alerta)';
            if (valorNota < 5 && valorNota > 0) corAnel = 'var(--cor-perigo)';
            if (valorNota === 0) corAnel = '#666';

            let conteudoNota = `<span class="nota-valor">NR</span>`;
            if (porcentagemNum > 0) {
                conteudoNota = `<span class="nota-valor">${porcentagemNum}</span><span class="simbolo-porcento">%</span>`;
            }

            const dataFormatada = formatarData(filme.dataExibicao);

            return `
                <div class="card-tmdb" onclick="window.location.href='detalhes.html?id=${filme.id}'">
                    <div class="poster-container">
                        <img src="${filme.linkPoster ? filme.linkPoster : placeholderImagem}" alt="${filme.tituloExibicao}" onerror="this.src='${placeholderImagem}'" draggable="false">
                        <div class="nota-donut" style="--cor-anel: ${corAnel}; --progresso: ${porcentagemNum}%">
                            <span>${conteudoNota}</span>
                        </div>
                    </div>
                    <div class="info-container">
                        <h3 class="info-titulo" title="${filme.tituloExibicao}">${filme.tituloExibicao}</h3>
                        <p class="info-data">${dataFormatada}</p>
                    </div>
                </div>
            `;
        }).join('');
    }

    function carregarMais() {
        alert("Página 2! Para fazer esse botão puxar novos filmes magicamente, precisaremos adicionar a paginação no nosso backend Java em breve. 🍿");
    }
</script>
</body>
</html>
