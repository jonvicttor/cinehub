<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detalhes - Cinehub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta Gótica "Abismo Minimalista" */
            --cor-primaria: #8a0303;
            --cor-fundo: #020202;
            --cor-card: #0a0a0c;
            --cor-texto: #dfdfdf;
            --cor-texto-sec: #6c757d;
            --cor-sucesso: #2d8a56;
            --cor-alerta: #b0a02c;
            --cor-perigo: #8a0303;
            --cor-ouro: #c0a062;
            --cor-borda: #1a1a1a;
            --transicao: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--cor-fundo); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; border: 1px solid var(--cor-fundo); }
        ::-webkit-scrollbar-thumb:hover { background: var(--cor-primaria); }

        body {
            background-color: var(--cor-fundo); color: var(--cor-texto);
            font-family: 'Inter', sans-serif; padding-bottom: 50px;
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        /* ======= TOP NAV (LETTERBOXD STYLE) ======= */
        .top-nav {
            width: 100%; position: sticky; top: 0; background-color: rgba(2, 2, 2, 0.98);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--cor-borda);
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; z-index: 1000;
        }

        .btn-hamburger { background: transparent; border: none; color: var(--cor-texto); font-size: 1.5rem; cursor: pointer; padding: 0; display: flex; align-items: center; transition: var(--transicao); }
        .btn-hamburger:hover { color: var(--cor-primaria); transform: scale(1.1); }

        .brand { text-decoration: none; display: flex; align-items: center; position: absolute; left: 50%; transform: translateX(-50%);}
        .brand-text { font-size: 1.4rem; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; margin: 0; color: #fff; }
        .brand-text span { color: var(--cor-primaria); }

        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .btn-search-nav { background: transparent; border: none; color: var(--cor-texto); font-size: 1.1rem; cursor: pointer; padding: 0; transition: var(--transicao);}
        .btn-search-nav:hover { color: var(--cor-primaria); transform: scale(1.1); }

        /* SINO DE NOTIFICAÇÃO (CO-WATCH) */
        .bell-wrapper { position: relative; cursor: pointer; display: flex; align-items: center; transition: var(--transicao);}
        .bell-wrapper:hover { transform: scale(1.1); }
        .bell-icon { font-size: 1.1rem; color: var(--cor-texto); }
        .bell-badge {
            display: none; position: absolute; top: -5px; right: -8px; background: var(--cor-primaria);
            color: #fff; font-size: 0.6rem; font-weight: 900; padding: 2px 5px; border-radius: 10px; border: 2px solid var(--cor-fundo);
        }

        .notificacoes-dropdown {
            display: none; position: absolute; top: 180%; right: 0; width: 300px;
            background: #050505; border: 1px solid var(--cor-borda); border-radius: 4px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); padding: 15px; z-index: 2000; flex-direction: column; gap: 10px;
        }
        .notificacoes-dropdown.open { display: flex; }
        .notif-titulo { font-size: 0.8rem; font-weight: 900; color: #fff; margin: 0; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--cor-borda); padding-bottom: 10px;}
        .notif-item { display: flex; flex-direction: column; gap: 8px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .notif-item:last-child { border-bottom: none; padding-bottom: 0; }
        .notif-texto { font-size: 0.8rem; color: #ccc; line-height: 1.4; }
        .notif-texto strong { color: #fff; font-weight: 800; }
        .notif-botoes { display: flex; gap: 10px; }
        .btn-notif { flex: 1; padding: 6px; border: none; border-radius: 2px; font-size: 0.7rem; font-weight: 800; cursor: pointer; transition: var(--transicao); text-transform: uppercase;}
        .btn-notif-aceitar { background: var(--cor-sucesso); color: #000; }
        .btn-notif-aceitar:hover { filter: brightness(1.2); }
        .btn-notif-recusar { background: transparent; border: 1px solid var(--cor-borda); color: var(--cor-texto-sec); }
        .btn-notif-recusar:hover { border-color: var(--cor-perigo); color: var(--cor-perigo); }

        /* ======= DRAWER ======= */
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1999; opacity: 0; pointer-events: none; transition: var(--transicao); backdrop-filter: blur(4px); }
        .menu-overlay.open { opacity: 1; pointer-events: auto; }

        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #08080a; z-index: 2000; border-right: 1px solid var(--cor-borda); display: flex; flex-direction: column; padding: 30px 20px; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); box-shadow: 10px 0 40px rgba(0,0,0,0.9); }
        .side-menu.open { left: 0; }

        .side-menu-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--cor-borda); padding-bottom: 20px; margin-bottom: 20px; }
        .side-menu-header h2 { margin: 0; font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; color: #fff; text-transform: uppercase;}
        .btn-close-menu { background: transparent; border: none; color: var(--cor-texto-sec); font-size: 1.3rem; cursor: pointer; transition: var(--transicao); }
        .btn-close-menu:hover { color: var(--cor-perigo); transform: rotate(90deg); }

        .menu-links { display: flex; flex-direction: column; gap: 5px; }
        .menu-links a { color: var(--cor-texto); text-decoration: none; font-size: 1rem; font-weight: 500; padding: 14px 12px; border-radius: 2px; transition: var(--transicao); display: flex; align-items: center; gap: 15px; border: 1px solid transparent; }
        .menu-links a:hover, .menu-links a.active { background: rgba(255,255,255,0.02); color: #fff; border-color: var(--cor-borda); }
        .menu-links a.active { border-color: var(--cor-primaria); color: var(--cor-primaria); font-weight: 700;}
        .menu-icon { font-size: 1.1rem; opacity: 0.6;}

        /* ======= SESSÃO DO BACKDROP ======= */
        .backdrop-section {
            position: relative; width: 100%; min-height: 85vh;
            background-color: var(--cor-fundo);
            background-size: cover; background-position: center; background-repeat: no-repeat;
            display: flex; align-items: center; justify-content: center;
            transition: background-image 0.5s ease;
        }
        .backdrop-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background:
                linear-gradient(to top, var(--cor-fundo) 0%, transparent 20%),
                linear-gradient(to right, rgba(2, 2, 2, 1) 15%, rgba(2, 2, 2, 0.85) 50%, rgba(2, 2, 2, 0.6) 100%);
        }

        .content-wrapper {
            position: relative; z-index: 2; display: flex; flex-direction: column;
            gap: 40px; padding: 40px 20px; max-width: 1200px; width: 100%;
        }
        @media (min-width: 768px) { .content-wrapper { flex-direction: row; align-items: flex-start; } }

        .poster-detalhe { width: 100%; max-width: 300px; margin: 0 auto; flex-shrink: 0; }
        .poster-detalhe img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); border: 1px solid var(--cor-borda); background-color: #000; filter: contrast(105%); }

        .info-detalhe { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .titulo { font-size: 2.2rem; font-weight: 900; line-height: 1.1; margin-bottom: 8px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .titulo span { font-weight: 400; color: var(--cor-texto-sec); font-family: 'Georgia', serif;}

        .dados-tecnicos { font-size: 0.85rem; color: #ccc; margin-bottom: 25px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        .classificacao-box { border: 1px solid var(--cor-texto-sec); border-radius: 2px; padding: 2px 6px; font-size: 0.75rem; font-weight: 700; color: #fff; }

        .acoes-container { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }

        .avaliacao-box { display: flex; align-items: center; gap: 12px; }
        .nota-donut-grande { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.8); background: #000; border: 3px solid var(--cor-anel); }
        .porcentagem-texto { z-index: 2; color: #fff; font-weight: 900; display: flex; align-items: flex-start; line-height: 1; }
        .nota-valor { font-size: 1.3rem; }
        .super-porcento { font-size: 0.6rem; position: relative; top: 1px; font-weight: 700; margin-left: 1px;}
        .texto-avaliacao { font-size: 0.75rem; font-weight: 800; line-height: 1.3; width: 70px; color: var(--cor-texto-sec); text-transform: uppercase; letter-spacing: 1px;}

        .btn-acao { width: 45px; height: 45px; border-radius: 2px; background: rgba(0,0,0,0.8); border: 1px solid var(--cor-borda); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transicao); font-size: 1.3rem; font-weight: 800; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-acao:hover { background: var(--cor-primaria); border-color: var(--cor-primaria); transform: translateY(-3px); }

        .btn-texto { background: transparent; border: none; color: #fff; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; transition: var(--transicao); text-transform: uppercase; letter-spacing: 1px;}
        .btn-texto:hover { color: var(--cor-primaria); }
        .btn-texto:disabled { opacity: 0.3; cursor: not-allowed; }

        .sinopse-container { margin-top: 10px; }
        .tagline { font-size: 1rem; font-style: italic; color: var(--cor-texto-sec); margin-bottom: 20px; font-family: 'Georgia', serif;}
        .sinopse-titulo { font-size: 1.1rem; font-weight: 900; margin-bottom: 10px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .sinopse-texto { font-size: 0.95rem; line-height: 1.7; color: #ccc; }

        .equipe-tecnica { display: flex; gap: 40px; margin-top: 30px; flex-wrap: wrap; }
        .membro-equipe { display: flex; flex-direction: column; }
        .membro-nome { font-weight: 800; color: #fff; font-size: 0.95rem; margin-bottom: 2px;}
        .membro-cargo { font-size: 0.75rem; color: var(--cor-texto-sec); text-transform: uppercase; letter-spacing: 0.5px;}

        /* ======= ELENCO ======= */
        .elenco-wrapper { max-width: 1200px; width: 100%; margin: 40px auto 0; padding: 0 20px; }
        .elenco-titulo { font-size: 1.2rem; font-weight: 900; margin-bottom: 20px; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid var(--cor-borda); padding-bottom: 10px;}
        .elenco-carrossel { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .elenco-carrossel::-webkit-scrollbar { display: none; }

        .ator-card { flex: 0 0 130px; background: transparent; border-radius: 4px; overflow: hidden; border: 1px solid var(--cor-borda); transition: var(--transicao); cursor: pointer;}
        .ator-card:hover { border-color: var(--cor-primaria); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(138,3,3,0.15);}
        .ator-foto { width: 100%; height: 180px; object-fit: cover; display: block; background-color: #000; filter: grayscale(20%); transition: var(--transicao);}
        .ator-card:hover .ator-foto { filter: grayscale(0%); }
        .ator-info { padding: 12px 10px; background: var(--cor-card); text-align: center; }
        .ator-nome { font-size: 0.8rem; font-weight: 800; margin: 0 0 4px 0; color: #fff; line-height: 1.2; text-transform: uppercase;}
        .ator-papel { font-size: 0.7rem; color: var(--cor-texto-sec); margin: 0; line-height: 1.3; font-style: italic;}

        /* ======= MODAL (THE VOID) ======= */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(3px); transition: var(--transicao); }
        .modal-content { background: #050505; width: 90%; max-width: 400px; padding: 30px; border-radius: 4px; border: 1px solid var(--cor-borda); animation: fadeInModal 0.4s cubic-bezier(0.19, 1, 0.22, 1); max-height: 95vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,1);}
        @keyframes fadeInModal { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .close-btn { float: right; font-size: 1.3rem; cursor: pointer; color: var(--cor-texto-sec); transition: var(--transicao); line-height: 1; }
        .close-btn:hover { color: var(--cor-perigo); transform: rotate(90deg); }

        .modal-form label { font-size: 0.65rem; font-weight: 700; color: var(--cor-texto-sec); display: block; margin-bottom: 6px; letter-spacing: 1.5px; margin-top: 18px; text-transform: uppercase;}
        .modal-form select, .modal-form input, .modal-form textarea { background: #000; border: 1px solid var(--cor-borda); color: white; padding: 12px; border-radius: 2px; width: 100%; font-family: 'Inter', sans-serif; font-size: 0.9rem; transition: var(--transicao); }
        .modal-form select:focus, .modal-form input:focus, .modal-form textarea:focus { outline: none; border-color: var(--cor-primaria); box-shadow: 0 0 10px rgba(138, 3, 3, 0.2); }

        .btn-salvar-modal { background: var(--cor-texto); border: none; color: #000; padding: 14px; border-radius: 2px; font-weight: 800; width: 100%; cursor: pointer; transition: var(--transicao); margin-top: 30px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1.5px;}
        .btn-salvar-modal:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2);}

        #modal-countdown { background: #000; color: #fff; padding: 15px; border-radius: 2px; text-align: center; font-weight: 800; margin: 15px 0 10px 0; font-size: 0.95rem; border: 1px solid var(--cor-primaria); box-shadow: 0 0 15px rgba(138,3,3,0.1);}

        /* MODAL TRAILER */
        .modal-trailer-content { background: transparent; width: 90%; max-width: 1000px; border: none; box-shadow: none; padding: 0; position: relative; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 1px solid var(--cor-borda); border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .close-btn-trailer { position: absolute; top: -40px; right: 0; font-size: 2rem; cursor: pointer; color: var(--cor-texto-sec); line-height: 1; z-index: 2001; transition: var(--transicao); }
        .close-btn-trailer:hover { color: var(--cor-perigo); transform: scale(1.1); }
    </style>
</head>
<body>

<header class="top-nav">
    <button class="btn-hamburger" onclick="toggleMenu()">☰</button>
    <a href="index.html" class="brand"><h1 class="brand-text">CINE<span>HUB</span></h1></a>

    <div class="nav-actions">
        <div class="bell-wrapper" onclick="window.location.href='library.html'" id="btn-bell" title="Ver convites na Library">
            <span class="bell-icon">🔔</span>
        </div>
        <button class="btn-search-nav" onclick="window.location.href='index.html'">🔍</button>
    </div>
</header>

<div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
<nav class="side-menu" id="side-menu">
    <div class="side-menu-header">
        <h2>CINEHUB</h2>
        <button class="btn-close-menu" onclick="toggleMenu()">✕</button>
    </div>
    <div class="menu-links">
        <a href="index.html"><span class="menu-icon">🏠</span> Home</a>
        <a href="library.html"><span class="menu-icon">📖</span> Library</a>
        <a href="calendario.html"><span class="menu-icon">📅</span> Agenda</a>
        <a href="comunidade.html"><span class="menu-icon">👥</span> Social</a>
        <a href="perfil.html"><span class="menu-icon">⚙️</span> Perfil</a>
    </div>
</nav>

<div class="backdrop-section" id="backdrop-bg">
    <div class="backdrop-overlay"></div>
    <div class="content-wrapper">
        <div class="poster-detalhe">
            <img id="poster-img" src="" alt="Poster" loading="lazy" decoding="async">
        </div>
        <div class="info-detalhe">
            <h1 class="titulo" id="titulo-filme">Carregando... <span id="ano-filme"></span></h1>

            <div class="dados-tecnicos" id="dados-filme">
                Buscando nas sombras...
            </div>

            <div class="acoes-container">
                <div class="avaliacao-box">
                    <div class="nota-donut-grande" id="nota-anel"></div>
                    <div class="texto-avaliacao">Avaliação TMDB</div>
                </div>

                <button class="btn-acao" onclick="abrirModal()" title="Adicionar à Library / Convidar">＋</button>
                <button class="btn-texto" id="btn-trailer" onclick="abrirTrailer()" disabled>▶ Trailer</button>
            </div>

            <div class="sinopse-container">
                <p class="tagline" id="tagline-filme"></p>
                <h3 class="sinopse-titulo">Sinopse</h3>
                <p class="sinopse-texto" id="sinopse-filme"></p>
            </div>

            <div class="equipe-tecnica" id="equipe-lista"></div>
        </div>
    </div>
</div>

<div class="elenco-wrapper">
    <h3 class="elenco-titulo">Elenco</h3>
    <div class="elenco-carrossel" id="elenco-lista">
        <p style="color: var(--cor-texto-sec); font-style: italic;">Aguardando dados...</p>
    </div>
</div>

<div id="modal-adicao" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModal()">&times;</span>
        <h2 id="modal-titulo" style="margin: 0 0 10px 0; color: #fff; font-size: 1.1rem; font-weight: 900; line-height: 1.2; text-transform: uppercase;">Título</h2>
        <div class="modal-form">
            <input type="hidden" id="modal-id-tmdb">

            <div id="campos-diario">
                <label>STATUS</label>
                <select id="modal-status"><option value="QUERO_VER">Quero Ver</option><option value="JA_VI">Já Vi</option><option value="ASSISTINDO">Assistindo</option><option value="ABANDONEI">Abandonei</option></select>
                <label>IDIOMA</label>
                <select id="modal-idioma"><option value="">Selecione...</option><option value="Dublado">Dublado</option><option value="Legendado">Legendado</option><option value="Original">Original</option></select>
                <label>SUA NOTA (0-5)</label>
                <input type="number" id="modal-nota" step="0.5" min="0" max="5" placeholder="Para o seu diário...">
                <label>REVIEW</label>
                <textarea id="modal-review" rows="3" placeholder="Escreva algo brilhante..."></textarea>
            </div>

            <div id="campos-agenda" style="display:none;">
                <div id="modal-countdown"></div>
                <label>QUAL SEU HYPE?</label>
                <select id="modal-hype">
                    <option value="Extremo">🔥 Extremo - Estreia no cinema!</option>
                    <option value="Alto">⭐ Alto - Não vejo a hora</option>
                    <option value="Médio">👍 Médio - Verei se puder</option>
                    <option value="Baixo">📺 Baixo - Espero sair no streaming</option>
                </select>
                <label>ONDE PRETENDE ASSISTIR?</label>
                <select id="modal-local">
                    <option value="Cinema">🍿 Cinema</option>
                    <option value="Streaming">📺 Streaming / TV</option>
                </select>
            </div>

            <label>TAGS</label>
            <input type="text" id="modal-tags" placeholder="Clássico, Terror...">

            <label id="label-convite">CONVIDAR PARA VER JUNTO</label>
            <select id="modal-convite">
                <option value="">Apenas eu (Solo)</option>
            </select>

            <button class="btn-salvar-modal" id="btn-acao-modal" onclick="salvarNoDiario()">Salvar Registro</button>
        </div>
    </div>
</div>

<div id="modal-trailer" class="modal">
    <div class="modal-content modal-trailer-content">
        <span class="close-btn-trailer" onclick="fecharTrailer()">&times;</span>
        <div class="video-container" id="video-container-yt"></div>
    </div>
</div>

<script>
    // Controle do Menu Hambúrguer
    function toggleMenu() {
        const menu = document.getElementById('side-menu');
        const overlay = document.getElementById('menu-overlay');
        menu.classList.toggle('open');
        overlay.classList.toggle('open');
        if(menu.classList.contains('open')) { document.body.style.overflow = 'hidden'; }
        else { document.body.style.overflow = 'auto'; }
    }

    const dadosUser = JSON.parse(localStorage.getItem('usuarioLogado'));
    if (dadosUser && dadosUser.corTema) { document.documentElement.style.setProperty('--cor-primaria', dadosUser.corTema); }
    if (!dadosUser) window.location.href = 'login.html';

    const HOJE = new Date(2026, 2, 31);
    const placeholderImagem = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='500' height='750' style='background:%23000'%3E%3Ctext fill='%236c757d' x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='24'%3ECINEHUB%3C/text%3E%3C/svg%3E";

    document.getElementById('poster-img').src = placeholderImagem;
    document.getElementById('poster-img').onerror = function() { this.src = placeholderImagem; };

    let filmeAtual = null;
    let chaveTrailerYouTube = null;

    // Lógica para otimizar os requests ao TMDB (Cache Persistente)
    let cacheTmdb = JSON.parse(localStorage.getItem('cinehub_tmdb_cache')) || {};

    window.onload = async function() {
        const urlParams = new URLSearchParams(window.location.search);
        const idFilme = urlParams.get('id');
        if (!idFilme) { window.location.href = 'index.html'; return; }

        await carregarDetalhes(idFilme);
        await popularAmigosModal();
    };

    function formatarData(dataString) {
        if (!dataString) return 'N/A';
        const partes = dataString.split('-');
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function formatarDuracao(minutos) {
        if (!minutos || minutos === 0) return '';
        const h = Math.floor(minutos / 60);
        const m = minutos % 60;
        return h > 0 ? `${h}h ${m}m` : `${m}m`;
    }

    async function carregarDetalhes(id) {
        try {
            // Verifica no Cache primeiro
            if (cacheTmdb[id] && cacheTmdb[id].credits) {
                filmeAtual = cacheTmdb[id];
            } else {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const response = await fetch(`/api/tmdb/${id}`, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!response.ok) throw new Error("Erro na comunicação com o servidor.");
                filmeAtual = await response.json();

                // Salva no cache persistente para carregar rápido na Library
                cacheTmdb[id] = filmeAtual;
                localStorage.setItem('cinehub_tmdb_cache', JSON.stringify(cacheTmdb));
            }

            if (!filmeAtual || !filmeAtual.tituloExibicao) throw new Error("Filme não encontrado.");

            document.getElementById('titulo-filme').innerHTML = `${filmeAtual.tituloExibicao} <span id="ano-filme">(${filmeAtual.dataExibicao ? filmeAtual.dataExibicao.split('-')[0] : ''})</span>`;

            const stringGeneros = filmeAtual.generos && filmeAtual.generos.length > 0 ? filmeAtual.generos.map(g => g.nome || g.name).join(', ') : (filmeAtual.tipoMidia === 'tv' ? 'Série' : 'Filme');
            const stringDuracao = formatarDuracao(filmeAtual.runtime);
            const bolinhaDuracao = stringDuracao ? ` • ${stringDuracao}` : '';

            document.getElementById('dados-filme').innerHTML = `<span class="classificacao-box">TMDB</span><span>${formatarData(filmeAtual.dataExibicao)} • ${stringGeneros}${bolinhaDuracao}</span>`;

            document.getElementById('tagline-filme').innerText = filmeAtual.tagline || '';
            document.getElementById('sinopse-filme').innerText = filmeAtual.overview || filmeAtual.sinopse || 'As sombras engoliram a sinopse deste título.';
            document.getElementById('poster-img').src = filmeAtual.linkPoster || placeholderImagem;

            if (filmeAtual.linkBackdrop) { document.getElementById('backdrop-bg').style.backgroundImage = `url('${filmeAtual.linkBackdrop}')`; }
            else if (filmeAtual.linkPoster) { document.getElementById('backdrop-bg').style.backgroundImage = `url('${filmeAtual.linkPoster}')`; }

            let valorNota = filmeAtual.notaTmdb || filmeAtual.vote_average || filmeAtual.voteAverage || 0;
            const porcentagemNum = valorNota > 0 ? (valorNota * 10).toFixed(0) : 0;
            let corAnel = 'var(--cor-texto-sec)';
            if (valorNota >= 7) corAnel = 'var(--cor-sucesso)';
            else if (valorNota >= 5) corAnel = 'var(--cor-alerta)';

            const donut = document.getElementById('nota-anel');
            donut.style.setProperty('--cor-anel', corAnel);
            donut.style.setProperty('--progresso', `${porcentagemNum}%`);
            if (porcentagemNum == 0) { donut.innerHTML = `<span class="porcentagem-texto"><span class="nota-valor">NR</span></span>`; }
            else { donut.innerHTML = `<span class="porcentagem-texto"><span class="nota-valor">${porcentagemNum}</span><span class="super-porcento">%</span></span>`; }

            if (filmeAtual.videos && filmeAtual.videos.results) {
                const trailer = filmeAtual.videos.results.find(v => v.site === 'YouTube' && v.type === 'Trailer');
                const videoAlternativo = filmeAtual.videos.results.find(v => v.site === 'YouTube');
                const videoFinal = trailer || videoAlternativo;
                if (videoFinal && videoFinal.key) {
                    chaveTrailerYouTube = videoFinal.key;
                    document.getElementById('btn-trailer').disabled = false;
                }
            }

            // OTIMIZADO: Construção do Elenco com Map/Join
            if (filmeAtual.credits && filmeAtual.credits.cast && filmeAtual.credits.cast.length > 0) {
                const elencoGrid = document.getElementById('elenco-lista');
                elencoGrid.innerHTML = filmeAtual.credits.cast.slice(0, 15).map(ator => {
                    const atorNome = ator.name || ator.nome || 'Desconhecido';
                    const atorPapel = ator.character || ator.personagem || 'Elenco';
                    return `<div class="ator-card"><img src="${ator.linkFoto || placeholderImagem}" alt="${atorNome}" class="ator-foto" onerror="this.src='${placeholderImagem}'" loading="lazy" decoding="async"><div class="ator-info"><p class="ator-nome">${atorNome}</p><p class="ator-papel">${atorPapel}</p></div></div>`;
                }).join('');
            } else { document.getElementById('elenco-lista').innerHTML = '<p style="color: var(--cor-texto-sec); font-style: italic;">Atores não revelados.</p>'; }

            if (filmeAtual.credits && filmeAtual.credits.crew) {
                const diretores = filmeAtual.credits.crew.filter(c => { const cargo = c.job || c.cargo; return cargo === 'Director' || cargo === 'Executive Producer' || cargo === 'Screenplay' || cargo === 'Novel'; });
                const diretoresTop = []; const nomesVistos = new Set();
                for (let d of diretores) {
                    const nomeDiretor = d.name || d.nome;
                    if (!nomesVistos.has(nomeDiretor) && diretoresTop.length < 3) { diretoresTop.push({nome: nomeDiretor, cargo: d.job || d.cargo}); nomesVistos.add(nomeDiretor); }
                }
                if (diretoresTop.length > 0) {
                    document.getElementById('equipe-lista').innerHTML = diretoresTop.map(d => `<div class="membro-equipe"><span class="membro-nome">${d.nome}</span><span class="membro-cargo">${d.cargo}</span></div>`).join('');
                }
            }
        } catch (e) {
            console.error("[Cinehub] Falha crítica:", e);
            document.getElementById('titulo-filme').innerText = "Vazio Encontrado";
            document.getElementById('dados-filme').innerText = "As informações se perderam no abismo.";
        }
    }

    // Busca os amigos para popular o dropdown de "Convidar"
    async function popularAmigosModal() {
        try {
            const res = await fetch(`/usuarios/${dadosUser.id}/seguindo`);
            if(res.ok) {
                const amigos = await res.json();
                const select = document.getElementById('modal-convite');
                amigos.forEach(amigo => {
                    select.innerHTML += `<option value="${amigo.id}">@${amigo.nickname || amigo.nome}</option>`;
                });
            }
        } catch(e) {}
    }

    function abrirModal() {
        if (!filmeAtual) return;
        document.getElementById('modal-id-tmdb').value = filmeAtual.id;
        document.getElementById('modal-titulo').innerText = filmeAtual.tituloExibicao;

        document.getElementById('modal-status').value = "QUERO_VER";
        document.getElementById('modal-idioma').value = "";
        document.getElementById('modal-nota').value = "";
        document.getElementById('modal-tags').value = "";
        document.getElementById('modal-review').value = "";
        document.getElementById('modal-convite').value = ""; // Reseta o convite

        let dataFilme = null;
        if (filmeAtual.dataExibicao && filmeAtual.dataExibicao.length > 0) {
            const p = filmeAtual.dataExibicao.split('-');
            dataFilme = new Date(p[0], p[1] - 1, p[2]);
        }

        const eFuturo = dataFilme && dataFilme > HOJE;

        if (eFuturo) {
            document.getElementById('campos-diario').style.display = 'none';
            document.getElementById('campos-agenda').style.display = 'block';
            document.getElementById('btn-acao-modal').innerText = "SALVAR NA AGENDA";

            const diffTime = Math.abs(dataFilme - HOJE);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('modal-countdown').innerHTML = `📅 Faltam ${diffDays} dias para a estreia!`;
        } else {
            document.getElementById('campos-diario').style.display = 'block';
            document.getElementById('campos-agenda').style.display = 'none';
            document.getElementById('btn-acao-modal').innerText = "SALVAR REGISTRO";
        }

        document.getElementById('modal-adicao').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modal-adicao').style.display = 'none'; }

    async function salvarNoDiario() {
        const isAgenda = document.getElementById('campos-agenda').style.display === 'block';
        let interactionStatus = "QUERO_VER";
        let interactionReview = document.getElementById('modal-review').value;

        if(isAgenda) {
            const hype = document.getElementById('modal-hype').value;
            const local = document.getElementById('modal-local').value;
            interactionReview = `[AGENDA] Expectativa: ${hype} | Onde: ${local}`;
        } else {
            interactionStatus = document.getElementById('modal-status').value;
        }

        let dataLancamento = null;
        if (filmeAtual && filmeAtual.dataExibicao) {
            dataLancamento = filmeAtual.dataExibicao;
        }

        const idFilmeStr = document.getElementById('modal-id-tmdb').value;
        const amigoConvidadoId = document.getElementById('modal-convite').value;

        const payload = {
            idFilmeTmdb: idFilmeStr,
            status: interactionStatus,
            idiomaAudio: document.getElementById('modal-idioma').value,
            nota: document.getElementById('modal-nota').value ? parseFloat(document.getElementById('modal-nota').value) : null,
            tags: document.getElementById('modal-tags').value,
            review: interactionReview,
            dataAgendada: dataLancamento
        };

        try {
            // 1. Salva na biblioteca local
            const response = await fetch(`/interacoes/usuario/${dadosUser.id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) { alert('Ocorreu um erro ao salvar o filme.'); return; }

            // 2. Dispara o convite se o usuário tiver escolhido alguém no dropdown
            if(amigoConvidadoId) {
                try {
                    const resConvite = await fetch('/convites/enviar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            remetenteId: dadosUser.id,
                            destinatarioId: amigoConvidadoId,
                            filmeTmdbId: idFilmeStr
                        })
                    });
                    if(!resConvite.ok) {
                        const msgErro = await resConvite.text();
                        alert("Aviso: " + msgErro);
                    }
                } catch(e) { console.error("Erro ao enviar o convite", e); }
            }

            fecharModal();

        } catch (error) {
            console.error("Erro ao salvar:", error);
            alert("Erro de conexão com o servidor.");
        }
    }

    function abrirTrailer() {
        if (!chaveTrailerYouTube) return;
        const container = document.getElementById('video-container-yt');
        container.innerHTML = `<iframe src="https://www.youtube.com/embed/${chaveTrailerYouTube}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        document.getElementById('modal-trailer').style.display = 'flex';
    }

    function fecharTrailer() {
        document.getElementById('modal-trailer').style.display = 'none';
        document.getElementById('video-container-yt').innerHTML = '';
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('modal-adicao')) fecharModal();
        if (event.target == document.getElementById('modal-trailer')) fecharTrailer();
        if (event.target == document.getElementById('menu-overlay')) toggleMenu();
    }
</script>
