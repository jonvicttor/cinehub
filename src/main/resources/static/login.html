<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cinehub</title>
    <style>
        :root {
            --cor-primaria: #800080;
            --cor-fundo: #1a1a1a;
            --cor-card: #2a2a2a;
            --cor-texto: #ffffff;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .login-container {
            background-color: var(--cor-card);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 350px;
            border: 1px solid #444;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { color: var(--cor-primaria); margin-bottom: 25px; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #1a1a1a;
            color: white;
            font-size: 1em;
        }

        input:focus {
            outline: none;
            border-color: var(--cor-primaria);
        }

        button {
            padding: 12px;
            background-color: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: 0.3s;
        }

        button:hover { filter: brightness(1.2); }

        .link-cadastro {
            margin-top: 15px;
            font-size: 0.85em;
            color: #ccc;
        }

        .link-cadastro a {
            color: var(--cor-primaria);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>🎬 Cinehub</h1>
    <p style="margin-bottom: 20px; font-size: 0.9em; color: #aaa;">Acesse sua conta para gerenciar seu diário</p>

    <div class="form-group">
        <input type="email" id="email" placeholder="Seu e-mail" required>
        <input type="password" id="senha" placeholder="Sua senha" required>
        <button onclick="realizarLogin()">Entrar</button>
    </div>

    <div class="link-cadastro">
        Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a>
    </div>
</div>

<script>
    async function realizarLogin() {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        if (!email || !senha) {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        const payload = { email, senha };

        try {
            const response = await fetch('/usuarios/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const usuario = await response.json();

                // O SEGREDO: Salva os dados no navegador para usar em outras páginas
                localStorage.setItem('usuarioLogado', JSON.stringify(usuario));

                alert(`Bem-vindo de volta, ${usuario.nome}!`);
                window.location.href = 'index.html'; // Redireciona para a busca
            } else {
                alert("E-mail ou senha inválidos.");
            }
        } catch (error) {
            console.error("Erro na requisição:", error);
            alert("Erro ao conectar com o servidor.");
        }
    }

    // Verifica se já está logado ao carregar a página
    window.onload = function() {
        if (localStorage.getItem('usuarioLogado')) {
            window.location.href = 'index.html';
        }
    };
</script>

</body>
</html>
