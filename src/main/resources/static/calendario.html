<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda - Cinehub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta Gótica "Abismo Minimalista" */
            --cor-primaria: #8a0303;
            --cor-fundo: #020202;
            --cor-card: #0a0a0c;
            --cor-texto: #dfdfdf;
            --cor-texto-sec: #6c757d;
            --cor-sucesso: #2d8a56;
            --cor-alerta: #b0a02c;
            --cor-perigo: #8a0303;
            --cor-ouro: #c0a062;
            --cor-borda: #1a1a1a;
            --transicao: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* Scrollbar Oculta/Premium */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--cor-fundo); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; border: 1px solid var(--cor-fundo); }
        ::-webkit-scrollbar-thumb:hover { background: var(--cor-primaria); }

        body {
            background-color: var(--cor-fundo); color: var(--cor-texto);
            font-family: 'Inter', sans-serif; margin: 0; padding: 0 0 80px 0;
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        /* ======= MUDANÇA VIP: TOP NAV (LETTERBOXD STYLE) ======= */
        .top-nav {
            width: 100%; position: sticky; top: 0; background-color: rgba(2, 2, 2, 0.98);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--cor-borda);
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; z-index: 1000;
        }

        .btn-hamburger { background: transparent; border: none; color: var(--cor-texto); font-size: 1.5rem; cursor: pointer; padding: 0; display: flex; align-items: center; transition: var(--transicao); }
        .btn-hamburger:hover { color: var(--cor-primaria); transform: scale(1.1); }

        .brand { text-decoration: none; display: flex; align-items: center; position: absolute; left: 50%; transform: translateX(-50%);}
        .brand-text { font-size: 1.4rem; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; margin: 0; color: #fff; }
        .brand-text span { color: var(--cor-primaria); }

        .btn-search-nav { background: transparent; border: none; color: var(--cor-texto); font-size: 1.1rem; cursor: pointer; padding: 0; transition: var(--transicao);}
        .btn-search-nav:hover { color: var(--cor-primaria); transform: scale(1.1); }

        /* ======= MENU LATERAL (DRAWER OF SHADOWS) ======= */
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1999; opacity: 0; pointer-events: none; transition: var(--transicao); backdrop-filter: blur(4px); }
        .menu-overlay.open { opacity: 1; pointer-events: auto; }

        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #08080a; z-index: 2000; border-right: 1px solid var(--cor-borda); display: flex; flex-direction: column; padding: 30px 20px; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); box-shadow: 10px 0 40px rgba(0,0,0,0.9); }
        .side-menu.open { left: 0; }

        .side-menu-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--cor-borda); padding-bottom: 20px; margin-bottom: 20px; }
        .side-menu-header h2 { margin: 0; font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; color: #fff; text-transform: uppercase;}
        .btn-close-menu { background: transparent; border: none; color: var(--cor-texto-sec); font-size: 1.3rem; cursor: pointer; transition: var(--transicao); }
        .btn-close-menu:hover { color: var(--cor-perigo); transform: rotate(90deg); }

        .menu-links { display: flex; flex-direction: column; gap: 5px; }
        .menu-links a { color: var(--cor-texto); text-decoration: none; font-size: 1rem; font-weight: 500; padding: 14px 12px; border-radius: 2px; transition: var(--transicao); display: flex; align-items: center; gap: 15px; border: 1px solid transparent; }
        .menu-links a:hover, .menu-links a.active { background: rgba(255,255,255,0.02); color: #fff; border-color: var(--cor-borda); }
        .menu-links a.active { border-color: var(--cor-primaria); color: var(--cor-primaria); font-weight: 700;}
        .menu-icon { font-size: 1.1rem; opacity: 0.6;}

        /* ======= CABEÇALHO DA PÁGINA ======= */
        .page-header { text-align: center; margin: 40px 0; padding: 0 20px; width: 100%; max-width: 800px;}
        .page-header h1 { font-size: 2rem; font-weight: 900; margin: 0 0 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; letter-spacing: 2px;}
        .page-header p { color: var(--cor-texto-sec); font-size: 0.95rem; margin: 0; font-weight: 400; line-height: 1.5; font-style: italic;}

        /* ======= CALENDÁRIO (CRYPT STYLE) ======= */
        .container-calendario { width: 100%; max-width: 1000px; padding: 0 20px; display: flex; flex-direction: column; gap: 40px; }

        .mes-secao {
            background: var(--cor-card);
            border-radius: 4px; border: 1px solid var(--cor-borda);
            padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: var(--transicao);
        }
        .mes-secao:hover { border-color: var(--cor-texto-sec); }

        .mes-titulo {
            font-size: 1.3rem; font-weight: 900; color: #fff;
            margin-bottom: 25px; text-transform: uppercase;
            letter-spacing: 3px; display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid var(--cor-borda); padding-bottom: 15px;
        }

        .grid-estreias { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        @media (max-width: 600px) { .grid-estreias { grid-template-columns: repeat(3, 1fr); gap: 10px; } .mes-secao { padding: 20px; } }

        .card-estreia {
            background-color: transparent; border-radius: 4px; overflow: visible;
            text-align: center; display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: var(--transicao); position: relative;
        }
        .card-estreia:hover { transform: translateY(-8px); }

        .poster-container { width: 100%; position: relative; }
        .poster-container img {
            width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block;
            background-color: #000; border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8); border: 1px solid var(--cor-borda);
            transition: var(--transicao);
        }
        .card-estreia:hover .poster-container img { border-color: var(--cor-primaria); box-shadow: 0 10px 25px rgba(138,3,3,0.3); filter: contrast(110%); }

        /* MUDANÇA VIP: DATA BADGE GÓTICO */
        .data-badge {
            background-color: #000; color: var(--cor-texto);
            font-size: 0.7rem; font-weight: 800; padding: 6px 12px;
            position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
            border-radius: 2px; border: 1px solid var(--cor-primaria);
            white-space: nowrap; box-shadow: 0 5px 15px rgba(0,0,0,0.9); z-index: 2;
            letter-spacing: 1px; font-family: 'Georgia', serif;
            transition: var(--transicao);
        }
        .card-estreia:hover .data-badge { background: var(--cor-primaria); color: #fff; border-color: #fff;}

        .info-estreia { padding-top: 25px; width: 100%; }
        .info-estreia h3 {
            font-size: 0.85rem; font-weight: 700; margin: 0; color: #fff; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            transition: var(--transicao);
        }
        .card-estreia:hover .info-estreia h3 { color: var(--cor-primaria); }

        /* ======= LOADER ======= */
        .loader-container { display: flex; justify-content: center; width: 100%; padding: 60px 0; }
        .loader { border: 2px solid var(--cor-borda); border-top: 2px solid var(--cor-primaria); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Estado Vazio (Empty State) */
        .empty-state { text-align:center; padding: 50px 20px; background: var(--cor-card); border-radius: 4px; border: 1px solid var(--cor-borda); box-shadow: inset 0 0 50px rgba(0,0,0,0.5); }
        .empty-state h3 { color: #fff; margin: 0 0 15px 0; font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;}
        .empty-state p { color: var(--cor-texto-sec); font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px; font-style: italic;}
        .empty-state a { display: inline-block; background: var(--cor-texto); color: #000; padding: 12px 25px; font-weight: 800; text-decoration: none; border-radius: 2px; text-transform: uppercase; letter-spacing: 1.5px; transition: var(--transicao); font-size: 0.85rem;}
        .empty-state a:hover { background: var(--cor-primaria); color: #fff; box-shadow: 0 5px 15px rgba(138,3,3,0.3);}
    </style>
</head>
<body>

<header class="top-nav">
    <button class="btn-hamburger" onclick="toggleMenu()">☰</button>
    <a href="index.html" class="brand"><h1 class="brand-text">CINE<span>HUB</span></h1></a>
    <button class="btn-search-nav" onclick="window.location.href='index.html'">🔍</button>
</header>

<div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
<nav class="side-menu" id="side-menu">
    <div class="side-menu-header">
        <h2>CINEHUB</h2>
        <button class="btn-close-menu" onclick="toggleMenu()">✕</button>
    </div>
    <div class="menu-links">
        <a href="index.html"><span class="menu-icon">🏠</span> Home</a>
        <a href="library.html"><span class="menu-icon">📖</span> Library</a>
        <a href="calendario.html" class="active"><span class="menu-icon">📅</span> Agenda</a>
        <a href="comunidade.html"><span class="menu-icon">👥</span> Social</a>
        <a href="perfil.html"><span class="menu-icon">⚙️</span> Perfil</a>
    </div>
</nav>

<div class="page-header">
    <h1>Agenda</h1>
    <p>Acompanhe a ressurreição dos filmes que estão na sua Watchlist.</p>
</div>

<div id="loader-container" class="loader-container">
    <div class="loader"></div>
</div>

<div class="container-calendario" id="container-calendario">
</div>

<script>
    // Função do Menu Lateral
    function toggleMenu() {
        const menu = document.getElementById('side-menu');
        const overlay = document.getElementById('menu-overlay');
        menu.classList.toggle('open');
        overlay.classList.toggle('open');
        if(menu.classList.contains('open')) { document.body.style.overflow = 'hidden'; }
        else { document.body.style.overflow = 'auto'; }
    }

    const dadosUsuario = JSON.parse(localStorage.getItem('usuarioLogado'));
    if (!dadosUsuario) window.location.href = 'login.html';

    if (dadosUsuario && dadosUsuario.corTema) {
        document.documentElement.style.setProperty('--cor-primaria', dadosUsuario.corTema);
    }

    // A CONSTANTE INQUEBRÁVEL (31 de Março de 2026)
    const HOJE = new Date(2026, 2, 31);

    window.onload = async function() {
        await carregarCalendario();
    };

    async function carregarCalendario() {
        try {
            const resInteracoes = await fetch(`/interacoes/usuario/${dadosUsuario.id}`);
            const interacoes = await resInteracoes.json();

            const agendaFutura = interacoes.filter(i => {
                if (i.status !== 'QUERO_VER' || !i.dataAgendada) return false;
                const p = i.dataAgendada.split('-');
                const dataFilme = new Date(p[0], p[1] - 1, p[2]);
                return dataFilme > HOJE;
            });

            if (agendaFutura.length === 0) {
                document.getElementById('loader-container').style.display = 'none';
                document.getElementById('container-calendario').innerHTML = `
                    <div class="empty-state">
                        <h3>O Futuro é Vazio</h3>
                        <p>Não há lançamentos agendados no seu radar no momento.<br>Mergulhe no Discovery e encontre novas obcessões.</p>
                        <a href="index.html">Explorar Filmes</a>
                    </div>`;
                return;
            }

            const promessas = agendaFutura.map(async (item) => {
                const res = await fetch(`/api/tmdb/${item.idFilmeTmdb}`);
                const detalhes = await res.json();
                return { ...detalhes, dataAgendadaOficial: item.dataAgendada };
            });

            let detalhesFilmes = await Promise.all(promessas);

            detalhesFilmes.sort((a, b) => {
                const dataA = new Date(a.dataAgendadaOficial);
                const dataB = new Date(b.dataAgendadaOficial);
                return dataA - dataB;
            });

            renderizarCalendario(detalhesFilmes);

        } catch (e) {
            console.error("Erro ao carregar calendário: ", e);
            document.getElementById('container-calendario').innerHTML = '<p style="text-align:center; color: var(--cor-perigo); font-weight: 700;">Erro fatal na leitura do calendário.</p>';
        } finally {
            document.getElementById('loader-container').style.display = 'none';
        }
    }

    function renderizarCalendario(filmes) {
        const container = document.getElementById('container-calendario');
        const meses = {};

        filmes.forEach(filme => {
            const partesData = filme.dataAgendadaOficial.split('-');
            const dataObj = new Date(partesData[0], partesData[1] - 1, partesData[2]);
            const chaveMes = dataObj.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });

            if (!meses[chaveMes]) meses[chaveMes] = [];
            meses[chaveMes].push(filme);
        });

        for (const [mes, listaFilmes] of Object.entries(meses)) {
            const secao = document.createElement('div');
            secao.className = 'mes-secao';

            let gridHtml = `<div class="mes-titulo">${mes}</div><div class="grid-estreias">`;

            listaFilmes.forEach(f => {
                const dataFormatada = f.dataAgendadaOficial.split('-').reverse().join('/');
                const linkPoster = f.linkPoster || 'https://via.placeholder.com/500x750?text=Sem+Poster';

                // Adicionado loading="lazy" na imagem!
                gridHtml += `
                    <div class="card-estreia" onclick="window.location.href='detalhes.html?id=${f.id || f.idTmdb}'">
                        <div class="poster-container">
                            <img src="${linkPoster}" onerror="this.src='https://via.placeholder.com/500x750?text=Sem+Poster'" alt="${f.tituloExibicao}" loading="lazy" decoding="async">
                            <div class="data-badge">${dataFormatada}</div>
                        </div>
                        <div class="info-estreia">
                            <h3>${f.tituloExibicao}</h3>
                        </div>
                    </div>
                `;
            });

            gridHtml += `</div>`;
            secao.innerHTML = gridHtml;
            container.appendChild(secao);
        }
    }
</script>
</body>
</html>
