<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - Cinehub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-primaria: #a333ff;
            --cor-fundo: #0d1115;
            --cor-card: rgba(27, 34, 40, 0.5); /* Vidro fosco igual a Library */
            --cor-texto: #ffffff;
            --cor-texto-sec: #8c9baf;
            --cor-borda: rgba(255, 255, 255, 0.08);
            --transicao: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--cor-fundo); color: var(--cor-texto);
            font-family: 'Inter', sans-serif; margin: 0; padding: 0 0 100px 0;
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
            background-image: radial-gradient(circle at top right, rgba(163, 51, 255, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(163, 51, 255, 0.05), transparent 40%);
            background-attachment: fixed;
        }

        /* ======= HEADER E BRANDING ======= */
        .header-top { width: 100%; max-width: 1200px; padding: 40px 20px 20px 20px; display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .brand { text-decoration: none; transition: var(--transicao); display: flex; align-items: center; }
        .brand:hover { transform: scale(1.03); filter: brightness(1.2); }
        .brand-text { font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; margin: 0; color: #fff; display: flex; align-items: center; }
        .brand-text span { font-weight: 800; margin-left: 3px; background: linear-gradient(135deg, #fff 10%, var(--cor-primaria) 80%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; transition: var(--transicao); }

        .page-header { text-align: center; margin-bottom: 40px; padding: 0 20px; }
        .page-header h1 { font-size: 1.8rem; font-weight: 800; margin: 0 0 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px;}
        .page-header p { color: var(--cor-texto-sec); font-size: 0.95rem; margin: 0; font-weight: 400; line-height: 1.4;}

        /* ======= CALENDÁRIO (ESTILO BENTO BOX) ======= */
        .container-calendario {
            width: 100%; max-width: 1000px; padding: 0 20px;
            display: flex; flex-direction: column; gap: 30px;
        }

        .mes-secao {
            background: var(--cor-card); backdrop-filter: blur(12px);
            border-radius: 20px; border: 1px solid var(--cor-borda);
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: var(--transicao);
        }
        .mes-secao:hover { border-color: rgba(255,255,255,0.1); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }

        .mes-titulo {
            font-size: 1.4rem; font-weight: 800; color: var(--cor-texto);
            margin-bottom: 25px; text-transform: capitalize;
            letter-spacing: 0.5px; display: flex; align-items: center; gap: 10px;
        }
        .mes-titulo::before { content: ""; display: block; width: 4px; height: 22px; background: var(--cor-primaria); border-radius: 4px;}

        .grid-estreias { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        @media (max-width: 600px) { .grid-estreias { grid-template-columns: repeat(3, 1fr); gap: 10px; } }

        .card-estreia {
            background-color: transparent; border-radius: 8px; overflow: visible;
            text-align: center; display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: var(--transicao); position: relative;
        }
        .card-estreia:hover { transform: translateY(-8px); }

        .poster-container { width: 100%; position: relative; }
        .poster-container img {
            width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block;
            background-color: #232a31; border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 2px solid transparent;
            transition: var(--transicao);
        }
        .card-estreia:hover .poster-container img { border-color: var(--cor-primaria); box-shadow: 0 10px 25px rgba(0,0,0,0.8); }

        .data-badge {
            background-color: var(--cor-primaria); color: #000;
            font-size: 0.7rem; font-weight: 800; padding: 4px 10px;
            position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-radius: 20px; border: 2px solid var(--cor-fundo);
            white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 2;
        }

        .info-estreia { padding-top: 20px; width: 100%; }
        .info-estreia h3 {
            font-size: 0.85rem; font-weight: 700; margin: 0; color: #fff; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* ======= LOADER E NAV ======= */
        .loader-container { display: flex; justify-content: center; width: 100%; padding: 40px 0; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--cor-primaria); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .nav-bottom { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: rgba(27, 34, 40, 0.9); backdrop-filter: blur(12px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--cor-borda); z-index: 1000; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        @media (min-width: 600px) { .nav-bottom { bottom: 20px; border-radius: 20px; border: 1px solid var(--cor-borda); } }
        .nav-bottom a { color: var(--cor-texto-sec); text-decoration: none; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: var(--transicao); }
        .nav-bottom a.active { color: var(--cor-primaria); }
        .nav-icon { font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="header-top">
    <a href="index.html" class="brand">
        <h1 class="brand-text">CINE<span>HUB</span></h1>
    </a>
</div>

<div class="page-header">
    <h1>📅 Agenda de Lançamentos</h1>
    <p>Acompanhe os próximos lançamentos dos filmes que estão na sua Watchlist.</p>
</div>

<div id="loader-container" class="loader-container">
    <div class="loader"></div>
</div>

<div class="container-calendario" id="container-calendario">
</div>

<nav class="nav-bottom">
    <a href="index.html"><span class="nav-icon">🔍</span>Home</a>
    <a href="library.html"><span class="nav-icon">📖</span>Library</a>
    <a href="calendario.html" class="active"><span class="nav-icon">📅</span>Agenda</a>
    <a href="comunidade.html"><span class="nav-icon">👥</span>Social</a>
    <a href="perfil.html"><span class="nav-icon">⚙️</span>Perfil</a>
</nav>

<script>
    const dadosUsuario = JSON.parse(localStorage.getItem('usuarioLogado'));
    if (!dadosUsuario) window.location.href = 'login.html';

    if (dadosUsuario && dadosUsuario.corTema) {
        document.documentElement.style.setProperty('--cor-primaria', dadosUsuario.corTema);
    }

    // "HOJE" simulado para 31 de Março de 2026.
    const HOJE = new Date(2026, 2, 31);

    window.onload = async function() {
        await carregarCalendario();
    };

    async function carregarCalendario() {
        try {
            // 1. Busca os dados de forma super rápida direto do NOSSO Java
            const resInteracoes = await fetch(`/interacoes/usuario/${dadosUsuario.id}`);
            const interacoes = await resInteracoes.json();

            // 2. Filtro Inteligente: Separa SÓ os que são QUERO_VER e que a dataAgendada é maior que HOJE.
            // Poupando centenas de requisições ao TMDB.
            const agendaFutura = interacoes.filter(i => {
                if (i.status !== 'QUERO_VER' || !i.dataAgendada) return false;
                const p = i.dataAgendada.split('-');
                const dataFilme = new Date(p[0], p[1] - 1, p[2]);
                return dataFilme > HOJE;
            });

            if (agendaFutura.length === 0) {
                document.getElementById('loader-container').style.display = 'none';
                document.getElementById('container-calendario').innerHTML = `
                    <div style="text-align:center; padding: 40px; background: var(--cor-card); border-radius: 20px; border: 1px dashed var(--cor-borda);">
                        <h3 style="color: #fff; margin-bottom: 10px;">Nada no horizonte!</h3>
                        <p style="color: var(--cor-texto-sec); font-size: 0.9rem;">Sua agenda de lançamentos está vazia no momento.<br>Descubra novos filmes para acompanhar!</p>
                        <br>
                        <a href="index.html" style="color: var(--cor-primaria); font-weight: 700; text-decoration: none;">Explorar Filmes</a>
                    </div>`;
                return;
            }

            // 3. Agora sim, busca no TMDB APENAS a capa e o título desses poucos filmes filtrados
            const promessas = agendaFutura.map(async (item) => {
                const res = await fetch(`/api/tmdb/${item.idFilmeTmdb}`);
                const detalhes = await res.json();

                // Mesclamos os detalhes do TMDB com a data Oficial do nosso Banco
                return {
                    ...detalhes,
                    dataAgendadaOficial: item.dataAgendada
                };
            });

            let detalhesFilmes = await Promise.all(promessas);

            // 4. Organiza por data crescente (mais próximo primeiro) usando a nossa data oficial
            detalhesFilmes.sort((a, b) => {
                const dataA = new Date(a.dataAgendadaOficial);
                const dataB = new Date(b.dataAgendadaOficial);
                return dataA - dataB;
            });

            renderizarCalendario(detalhesFilmes);

        } catch (e) {
            console.error("Erro ao carregar calendário: ", e);
            document.getElementById('container-calendario').innerHTML = '<p style="text-align:center; color: var(--cor-perigo);">Erro ao carregar os dados da Agenda.</p>';
        } finally {
            document.getElementById('loader-container').style.display = 'none';
        }
    }

    function renderizarCalendario(filmes) {
        const container = document.getElementById('container-calendario');
        const meses = {};

        // Agrupa por mês e ano usando a dataAgendadaOficial
        filmes.forEach(filme => {
            const partesData = filme.dataAgendadaOficial.split('-');
            const dataObj = new Date(partesData[0], partesData[1] - 1, partesData[2]);

            const chaveMes = dataObj.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });

            if (!meses[chaveMes]) meses[chaveMes] = [];
            meses[chaveMes].push(filme);
        });

        // Cria as caixas Bento para cada mês
        for (const [mes, listaFilmes] of Object.entries(meses)) {
            const secao = document.createElement('div');
            secao.className = 'mes-secao';

            let gridHtml = `<div class="mes-titulo">${mes}</div><div class="grid-estreias">`;

            listaFilmes.forEach(f => {
                const dataFormatada = f.dataAgendadaOficial.split('-').reverse().join('/');
                const linkPoster = f.linkPoster || 'https://via.placeholder.com/500x750?text=Sem+Poster';

                gridHtml += `
                    <div class="card-estreia" onclick="window.location.href='detalhes.html?id=${f.id || f.idTmdb}'">
                        <div class="poster-container">
                            <img src="${linkPoster}" onerror="this.src='https://via.placeholder.com/500x750?text=Sem+Poster'" alt="${f.tituloExibicao}">
                            <div class="data-badge">${dataFormatada}</div>
                        </div>
                        <div class="info-estreia">
                            <h3>${f.tituloExibicao}</h3>
                        </div>
                    </div>
                `;
            });

            gridHtml += `</div>`;
            secao.innerHTML = gridHtml;
            container.appendChild(secao);
        }
    }
</script>
</body>
</html>
