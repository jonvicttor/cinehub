<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Cinehub</title>
    <style>
        :root {
            --cor-primaria: #800080;
            --cor-fundo: #1a1a1a;
            --cor-card: #2a2a2a;
            --cor-texto: #ffffff;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .cadastro-container {
            background-color: var(--cor-card);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 350px;
            border: 1px solid #444;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { color: var(--cor-primaria); margin-bottom: 25px; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #1a1a1a;
            color: white;
            font-size: 1em;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--cor-primaria);
        }

        button {
            padding: 12px;
            background-color: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { filter: brightness(1.2); }

        .link-login {
            margin-top: 15px;
            font-size: 0.85em;
            color: #ccc;
        }

        .link-login a {
            color: var(--cor-primaria);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="cadastro-container">
    <h1>📝 Cadastro</h1>
    <p style="margin-bottom: 20px; font-size: 0.9em; color: #aaa;">Crie sua conta no Cinehub</p>

    <div class="form-group">
        <input type="text" id="nome" placeholder="Seu Nome Completo" required>
        <input type="text" id="nickname" placeholder="Seu @nickname (ex: Jones)" required>
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="password" id="senha" placeholder="Crie uma senha" required>
        <button onclick="realizarCadastro()">Criar Conta</button>
    </div>

    <div class="link-login">
        Já tem uma conta? <a href="login.html">Faça login</a>
    </div>
</div>

<script>
    async function realizarCadastro() {
        const nome = document.getElementById('nome').value;
        const nickname = document.getElementById('nickname').value;
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        // Validação básica
        if (!nome || !nickname || !email || !senha) {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        const payload = { nome, nickname, email, senha };

        try {
            const response = await fetch('/usuarios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("Conta criada com sucesso! Faça seu login agora.");
                window.location.href = 'login.html';
            } else if (response.status === 400) {
                alert("Erro: E-mail ou Nickname já estão em uso.");
            } else {
                alert("Erro ao realizar cadastro. Tente novamente.");
            }
        } catch (error) {
            console.error("Erro na requisição:", error);
            alert("Erro de conexão com o servidor.");
        }
    }
</script>

</body>
</html>
