<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Diário - Cinehub</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #800080; margin-bottom: 5px; }
        .subtitulo { color: #ccc; margin-bottom: 30px; font-size: 0.9em; }

        /* Estilo elegante para o Menu de Navegação */
        .nav-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            background-color: #2a2a2a;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #444;
        }
        .nav-bar a {
            padding: 8px 15px;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.9em;
        }
        .nav-bar a:hover { background-color: #444; }
        .nav-bar a.active { background-color: #800080; }

        #lista-diario {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }

        .card-filme {
            background-color: #2a2a2a;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative; /* Necessário para a etiqueta de status flutuar */
        }

        .card-filme img {
            width: 100%;
            border-radius: 5px;
        }

        .badge {
            display: inline-block;
            margin-top: 5px;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7em;
            font-weight: bold;
            background-color: #444;
        }

        /* Etiqueta flutuante mostrando "QUERO VER" etc. */
        .status-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #800080;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: bold;
            border: 2px solid #1a1a1a;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="index.html">🔍 Buscar no TMDB</a>
    <a href="diario.html" class="active">📖 Meu Diário</a>
</div>

<h1>📖 Meu Diário</h1>
<p class="subtitulo">Sua coleção pessoal do Cinehub</p>

<div id="lista-diario">
    <p>Carregando seu diário mágico...</p>
</div>

<script>
    // O JavaScript roda essa função sozinho assim que a página abre
    window.onload = async function() {
        await carregarDiario();
    };

    async function carregarDiario() {
        const usuarioId = 1; // Nosso usuário fixo por enquanto
        const lista = document.getElementById('lista-diario');

        try {
            // Passo 1: Bate na porta do seu Java e pede a lista do Supabase
            const responseBanco = await fetch(`/interacoes/usuario/${usuarioId}`);
            const interacoes = await responseBanco.json();

            if (interacoes.length === 0) {
                lista.innerHTML = '<p style="text-align:center; width: 100%;">Seu diário está vazio. Vá em "Buscar" e adicione seus favoritos!</p>';
                return;
            }

            lista.innerHTML = ''; // Apaga a mensagem de "Carregando"

            // Passo 2: Faz um "loop" e para cada ID, pede a capa pro TMDB
            for (const interacao of interacoes) {
                try {
                    const responseTmdb = await fetch(`/api/tmdb/${interacao.idFilmeTmdb}`);
                    const filme = await responseTmdb.json();

                    // Formatação visual (igual à tela de busca)
                    const tipoDisplay = filme.media_type === 'tv' ? '📺 Série' : '🎬 Filme';
                    let dataDisplay = 'N/A';
                    if (filme.dataExibicao) {
                        const [ano, mes, dia] = filme.dataExibicao.split('-');
                        if (dia && mes && ano) dataDisplay = `${dia}/${mes}/${ano}`;
                        else dataDisplay = filme.dataExibicao;
                    }

                    // Tira o _ do QUERO_VER pra ficar "QUERO VER"
                    const statusLimpo = interacao.status.replace('_', ' ');

                    const card = `
                        <div class="card-filme">
                            <div class="status-badge">${statusLimpo}</div>
                            <img src="${filme.linkPoster}" alt="Poster" onerror="this.src='https://via.placeholder.com/500x750?text=Sem+Poster'">
                            <span class="badge">${tipoDisplay}</span>
                            <h3 style="font-size: 1.1em; margin: 10px 0;">${filme.tituloExibicao}</h3>
                            <p style="font-size: 0.8em; color: #ccc;">Lançamento: ${dataDisplay}</p>
                        </div>
                    `;
                    lista.innerHTML += card;

                } catch (erroTmdb) {
                    console.error("Erro ao puxar dados do ID: " + interacao.idFilmeTmdb, erroTmdb);
                }
            }
        } catch (error) {
            console.error("Erro ao ler o banco de dados:", error);
            lista.innerHTML = '<p style="color: red; text-align:center;">Erro ao conectar com o banco de dados.</p>';
        }
    }
</script>
</body>
</html>
