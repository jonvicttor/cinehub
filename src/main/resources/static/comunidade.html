<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade - Cinehub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta Gótica "Abismo Minimalista" */
            --cor-primaria: #8a0303;
            --cor-fundo: #020202;
            --cor-card: #0a0a0c;
            --cor-texto: #dfdfdf;
            --cor-texto-sec: #6c757d;
            --cor-sucesso: #2d8a56;
            --cor-alerta: #b0a02c;
            --cor-perigo: #8a0303;
            --cor-ouro: #c0a062;
            --cor-borda: #1a1a1a;
            --transicao: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--cor-fundo); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; border: 1px solid var(--cor-fundo); }
        ::-webkit-scrollbar-thumb:hover { background: var(--cor-primaria); }

        body {
            background-color: var(--cor-fundo); color: var(--cor-texto);
            font-family: 'Inter', sans-serif; margin: 0; padding: 0 0 80px 0;
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        /* ======= TOP NAV ======= */
        .top-nav {
            width: 100%; position: sticky; top: 0; background-color: rgba(2, 2, 2, 0.98);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--cor-borda);
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; z-index: 1000;
        }

        .btn-hamburger { background: transparent; border: none; color: var(--cor-texto); font-size: 1.5rem; cursor: pointer; padding: 0; display: flex; align-items: center; transition: var(--transicao); }
        .btn-hamburger:hover { color: var(--cor-primaria); transform: scale(1.1); }

        .brand { text-decoration: none; display: flex; align-items: center; position: absolute; left: 50%; transform: translateX(-50%);}
        .brand-text { font-size: 1.4rem; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; margin: 0; color: #fff; }
        .brand-text span { color: var(--cor-primaria); }

        .btn-search-nav { background: transparent; border: none; color: var(--cor-texto); font-size: 1.1rem; cursor: pointer; padding: 0; transition: var(--transicao);}
        .btn-search-nav:hover { color: var(--cor-primaria); transform: scale(1.1); }

        /* ======= DRAWER ======= */
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1999; opacity: 0; pointer-events: none; transition: var(--transicao); backdrop-filter: blur(4px); }
        .menu-overlay.open { opacity: 1; pointer-events: auto; }

        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #08080a; z-index: 2000; border-right: 1px solid var(--cor-borda); display: flex; flex-direction: column; padding: 30px 20px; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); box-shadow: 10px 0 40px rgba(0,0,0,0.9); }
        .side-menu.open { left: 0; }

        .side-menu-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--cor-borda); padding-bottom: 20px; margin-bottom: 20px; }
        .side-menu-header h2 { margin: 0; font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; color: #fff; text-transform: uppercase;}
        .btn-close-menu { background: transparent; border: none; color: var(--cor-texto-sec); font-size: 1.3rem; cursor: pointer; transition: var(--transicao); }
        .btn-close-menu:hover { color: var(--cor-perigo); transform: rotate(90deg); }

        .menu-links { display: flex; flex-direction: column; gap: 5px; }
        .menu-links a { color: var(--cor-texto); text-decoration: none; font-size: 1rem; font-weight: 500; padding: 14px 12px; border-radius: 2px; transition: var(--transicao); display: flex; align-items: center; gap: 15px; border: 1px solid transparent; }
        .menu-links a:hover, .menu-links a.active { background: rgba(255,255,255,0.02); color: #fff; border-color: var(--cor-borda); }
        .menu-links a.active { border-color: var(--cor-primaria); color: var(--cor-primaria); font-weight: 700;}
        .menu-icon { font-size: 1.1rem; opacity: 0.6;}

        /* ======= CABEÇALHO ======= */
        .page-header { text-align: center; margin: 40px 0 30px 0; padding: 0 20px; width: 100%; max-width: 800px;}
        .page-header h1 { font-size: 2rem; font-weight: 900; margin: 0 0 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; letter-spacing: 2px;}
        .page-header p { color: var(--cor-texto-sec); font-size: 0.95rem; margin: 0; font-weight: 400; line-height: 1.5; font-style: italic;}

        /* ======= MENU ABAS ======= */
        .tabs-comunidade {
            display: flex; gap: 15px; margin-bottom: 40px; background: rgba(255,255,255,0.01);
            padding: 5px; border-radius: 2px; border: 1px solid var(--cor-borda);
        }
        .tab-btn {
            background: transparent; border: none; color: var(--cor-texto-sec);
            padding: 12px 25px; border-radius: 2px; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; transition: var(--transicao); text-transform: uppercase; letter-spacing: 1px;
        }
        .tab-btn:hover { color: #fff; }
        .tab-btn.active { background: var(--cor-primaria); color: #fff; }

        /* ======= CONTEÚDO PRINCIPAL ======= */
        .comunidade-wrapper {
            width: 100%; max-width: 800px; padding: 0 20px;
            display: flex; flex-direction: column; gap: 40px;
        }

        .view-section { display: none; width: 100%; flex-direction: column; gap: 40px; }
        .view-section.active { display: flex; }

        .secao-titulo {
            width: 100%; border-bottom: 1px solid var(--cor-borda); padding-bottom: 10px;
            margin-bottom: 20px; color: #fff; font-weight: 900; font-size: 1.1rem;
            text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 10px;
        }
        .secao-titulo::before { content: ""; display: block; width: 4px; height: 18px; background: var(--cor-primaria); border-radius: 4px;}

        /* ======= ÁREA DE BUSCA ======= */
        .search-container { width: 100%; display: flex; gap: 8px; margin-bottom: 10px;}
        .search-container input {
            background: #000; border: 1px solid var(--cor-borda); border-radius: 2px;
            padding: 16px 25px; color: white; flex-grow: 1; font-size: 0.95rem; font-family: 'Inter', sans-serif;
            transition: var(--transicao);
        }
        .search-container input:focus { outline: none; border-color: var(--cor-primaria); box-shadow: 0 0 15px rgba(138, 3, 3, 0.2); }
        .btn-busca {
            background: var(--cor-texto); border: none; border-radius: 2px;
            padding: 0 25px; color: #000; font-weight: 800; cursor: pointer; transition: var(--transicao); text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;
        }
        .btn-busca:hover { background: var(--cor-primaria); color: #fff; }

        /* ======= GRID USUÁRIOS ======= */
        .grid-usuarios { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; }
        .card-usuario {
            background-color: var(--cor-card); padding: 25px 20px; border-radius: 4px;
            text-align: center; border: 1px solid var(--cor-borda); transition: var(--transicao);
            display: flex; flex-direction: column; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .card-usuario:hover { border-color: var(--cor-primaria); transform: translateY(-5px); box-shadow: 0 10px 25px rgba(138,3,3,0.2); }

        .foto-perfil {
            width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 15px;
            background-color: #000; border: 1px solid var(--cor-borda); overflow: hidden;
            transition: var(--transicao);
        }
        .card-usuario:hover .foto-perfil { border-color: var(--cor-primaria); }
        .foto-perfil img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%); }

        .nome-user { font-weight: 900; font-size: 1.1rem; color: #fff; margin-bottom: 4px; display: block; text-transform: uppercase; letter-spacing: 1px;}
        .nick-user { color: var(--cor-texto-sec); font-size: 0.8rem; font-weight: 500; display: block; margin-bottom: 20px; font-family: 'Georgia', serif;}

        .btn-seguir {
            width: 100%; padding: 10px; border-radius: 2px; border: 1px solid var(--cor-borda);
            background: transparent; color: var(--cor-texto-sec); font-weight: 700; cursor: pointer;
            transition: var(--transicao); text-transform: uppercase; font-size: 0.75rem; margin-bottom: 10px; letter-spacing: 1px;
        }
        .btn-seguir:hover { border-color: var(--cor-primaria); color: var(--cor-primaria); }
        .btn-seguir.seguindo { background-color: rgba(138,3,3,0.1); color: var(--cor-primaria); border-color: var(--cor-primaria); }

        .btn-ver-diario {
            display: block; width: 100%; font-size: 0.75rem; font-weight: 700; color: var(--cor-texto-sec);
            text-decoration: none; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 2px; border: 1px solid transparent; transition: var(--transicao); text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-ver-diario:hover { color: #fff; background: rgba(255,255,255,0.05); }

        /* ======= FEED DE ATIVIDADE ======= */
        .feed-container { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .feed-item {
            background: var(--cor-card); border-radius: 4px; padding: 20px;
            border: 1px solid var(--cor-borda); display: flex; gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: var(--transicao);
        }
        .feed-item:hover { border-color: var(--cor-texto-sec); }

        .feed-avatar { width: 50px; height: 50px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1px solid var(--cor-borda); transition: var(--transicao);}
        .feed-item:hover .feed-avatar { border-color: var(--cor-primaria); }
        .feed-avatar img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%);}

        .feed-content { flex-grow: 1; display: flex; flex-direction: column; }
        .feed-header { font-size: 0.85rem; color: var(--cor-texto-sec); margin-bottom: 15px; line-height: 1.5; letter-spacing: 0.5px;}
        .feed-header strong { color: #fff; font-size: 0.95rem; cursor: pointer; transition: var(--transicao); font-weight: 800;}
        .feed-header strong:hover { color: var(--cor-primaria); }

        .feed-movie-box {
            display: flex; gap: 15px; background: #000; padding: 10px;
            border-radius: 2px; border: 1px solid var(--cor-borda); cursor: pointer; transition: var(--transicao);
        }
        .feed-movie-box:hover { border-color: var(--cor-primaria); box-shadow: 0 5px 15px rgba(138,3,3,0.15);}

        .feed-poster { width: 60px; border-radius: 2px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--cor-borda);}
        .feed-poster img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; filter: grayscale(10%); transition: var(--transicao);}
        .feed-movie-box:hover .feed-poster img { filter: grayscale(0%); }

        .feed-movie-info { display: flex; flex-direction: column; justify-content: center;}
        .feed-movie-title { font-weight: 900; color: #fff; font-size: 1rem; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 1px;}
        .feed-stars { color: var(--cor-ouro); font-size: 0.75rem; letter-spacing: 2px;}

        .feed-review {
            margin-top: 15px; font-size: 0.9rem; color: #ccc; line-height: 1.6;
            padding-left: 15px; border-left: 2px solid var(--cor-primaria); font-style: italic;
        }

        .loader { border: 2px solid var(--cor-borda); border-top: 2px solid var(--cor-primaria); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Estado Vazio (Empty State) */
        .empty-state { text-align:center; padding: 40px 20px; background: var(--cor-card); border-radius: 4px; border: 1px solid var(--cor-borda); box-shadow: inset 0 0 50px rgba(0,0,0,0.5); width: 100%; grid-column: 1/-1;}
        .empty-state h3 { color: #fff; margin: 0 0 10px 0; font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;}
        .empty-state p { color: var(--cor-texto-sec); font-size: 0.85rem; line-height: 1.6; font-style: italic; margin: 0;}
    </style>
</head>
<body>

<header class="top-nav">
    <button class="btn-hamburger" onclick="toggleMenu()">☰</button>
    <a href="index.html" class="brand"><h1 class="brand-text">CINE<span>HUB</span></h1></a>
    <button class="btn-search-nav" onclick="window.location.href='index.html'">🔍</button>
</header>

<div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
<nav class="side-menu" id="side-menu">
    <div class="side-menu-header">
        <h2>CINEHUB</h2>
        <button class="btn-close-menu" onclick="toggleMenu()">✕</button>
    </div>
    <div class="menu-links">
        <a href="index.html"><span class="menu-icon">🏠</span> Home</a>
        <a href="library.html"><span class="menu-icon">📖</span> Library</a>
        <a href="calendario.html"><span class="menu-icon">📅</span> Agenda</a>
        <a href="comunidade.html" class="active"><span class="menu-icon">👥</span> Social</a>
        <a href="perfil.html"><span class="menu-icon">⚙️</span> Perfil</a>
    </div>
</nav>

<div class="page-header">
    <h1>Comunidade</h1>
    <p>Rastreie os passos e descubra as obcessões dos seus amigos.</p>
</div>

<div class="tabs-comunidade">
    <button class="tab-btn active" onclick="trocarAba('view-feed', this)">Feed Escuro</button>
    <button class="tab-btn" onclick="trocarAba('view-busca', this)">Membros</button>
</div>

<div class="comunidade-wrapper">

    <div id="view-feed" class="view-section active">
        <div class="secao-titulo">Atividade Recente</div>
        <div id="loader-feed" class="loader"></div>
        <div class="feed-container" id="feed-lista">
        </div>
    </div>

    <div id="view-busca" class="view-section">
        <div class="search-container">
            <input type="text" id="input-nick" placeholder="Buscar por @nickname ou nome...">
            <button class="btn-busca" onclick="buscarUsuario()">Buscar</button>
        </div>

        <div id="container-resultado" style="display: none; margin-top: 10px;">
            <div class="secao-titulo">Resultado</div>
            <div class="grid-usuarios" id="resultado-busca"></div>
        </div>

        <div style="margin-top: 20px;">
            <div class="secao-titulo">Sua Ceita (Seguindo)</div>
            <div class="grid-usuarios" id="lista-seguindo">
                <div class="empty-state">
                    <p>Você ainda não segue ninguém.</p>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    // ======= CONTROLE DO MENU HAMBÚRGUER =======
    function toggleMenu() {
        const menu = document.getElementById('side-menu');
        const overlay = document.getElementById('menu-overlay');
        menu.classList.toggle('open');
        overlay.classList.toggle('open');
        if(menu.classList.contains('open')) { document.body.style.overflow = 'hidden'; }
        else { document.body.style.overflow = 'auto'; }
    }

    const dadosLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
    if (!dadosLogado) window.location.href = 'login.html';
    if (dadosLogado && dadosLogado.corTema) { document.documentElement.style.setProperty('--cor-primaria', dadosLogado.corTema); }

    let usuariosSeguidosGlobais = [];
    let cacheFilmesFeed = {};

    window.onload = async function() {
        await carregarQuemEuSigo();
        await carregarFeedGeral();
    };

    function trocarAba(idAlvo, elementoBtn) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(idAlvo).classList.add('active');
        elementoBtn.classList.add('active');
    }

    // ==========================================
    // LÓGICA DE SEGUIDORES E BUSCA
    // ==========================================
    async function carregarQuemEuSigo() {
        try {
            const res = await fetch(`/usuarios/${dadosLogado.id}/seguindo`);
            usuariosSeguidosGlobais = await res.json();
            renderizarListaSeguindo(usuariosSeguidosGlobais);
        } catch (e) { console.error(e); }
    }

    async function buscarUsuario() {
        const inputBusca = document.getElementById('input-nick').value.trim();
        const nick = inputBusca.replace('@', '');
        if (!nick) return;

        try {
            const res = await fetch(`/usuarios/busca/${nick}`);
            if (res.ok) {
                const user = await res.json();
                document.getElementById('container-resultado').style.display = 'block';
                renderizarResultado(user);
            } else {
                alert("Usuário não encontrado nas sombras.");
                document.getElementById('container-resultado').style.display = 'none';
            }
        } catch (e) { console.error(e); }
    }

    function renderizarResultado(user) {
        const container = document.getElementById('resultado-busca');
        const idsSeguindo = new Set(usuariosSeguidosGlobais.map(u => u.id));
        const isSeguindo = idsSeguindo.has(user.id);
        const textoBotao = isSeguindo ? "Seguindo" : "Seguir";
        const classeBotao = isSeguindo ? "btn-seguir seguindo" : "btn-seguir";
        const displayBotao = user.id === dadosLogado.id ? 'none' : 'block';
        const avatarUrl = `https://ui-avatars.com/api/?name=${user.nome}&background=111&color=fff&size=100`;

        container.innerHTML = `
            <div class="card-usuario">
                <div class="foto-perfil"><img src="${avatarUrl}" alt="${user.nome}" loading="lazy" decoding="async"></div>
                <span class="nome-user">${user.nome}</span>
                <span class="nick-user">@${user.nickname || user.nome.split(' ')[0].toLowerCase()}</span>
                <button class="${classeBotao}" style="display: ${displayBotao}" onclick="toggleSeguir(${user.id})">${textoBotao}</button>
                <a href="library.html?amigoId=${user.id}" class="btn-ver-diario">Inspecionar Library</a>
            </div>`;
    }

    function renderizarListaSeguindo(lista) {
        const container = document.getElementById('lista-seguindo');
        if (lista.length === 0) {
            container.innerHTML = '<div class="empty-state"><p>Você ainda não segue ninguém.</p></div>';
            return;
        }

        container.innerHTML = lista.map(user => {
            const avatarUrl = `https://ui-avatars.com/api/?name=${user.nome}&background=111&color=fff&size=100`;
            return `
                <div class="card-usuario">
                    <div class="foto-perfil"><img src="${avatarUrl}" alt="${user.nome}" loading="lazy" decoding="async"></div>
                    <span class="nome-user">${user.nome}</span>
                    <span class="nick-user">@${user.nickname || user.nome.split(' ')[0].toLowerCase()}</span>
                    <button class="btn-seguir seguindo" onclick="toggleSeguir(${user.id})">Seguindo</button>
                    <a href="library.html?amigoId=${user.id}" class="btn-ver-diario">Inspecionar Library</a>
                </div>`;
        }).join('');
    }

    async function toggleSeguir(seguidoId) {
        try {
            const res = await fetch(`/usuarios/${dadosLogado.id}/seguir/${seguidoId}`, { method: 'POST' });
            if (res.ok) {
                await carregarQuemEuSigo();
                await carregarFeedGeral();
                const nickBusca = document.getElementById('input-nick').value.replace('@', '');
                if (nickBusca) buscarUsuario();
            }
        } catch (e) { console.error(e); }
    }

    // ==========================================
    // LÓGICA DO FEED DE ATIVIDADE
    // ==========================================
    async function getInfoFilme(idTmdb) {
        if (cacheFilmesFeed[idTmdb]) return cacheFilmesFeed[idTmdb];
        try {
            const res = await fetch(`/api/tmdb/${idTmdb}`);
            const f = await res.json();
            cacheFilmesFeed[idTmdb] = f;
            return f;
        } catch(e) { return {}; }
    }

    function gerarEstrelinhas(nota) {
        if (!nota) return '';
        let str = '';
        for(let i=1; i<=Math.floor(nota); i++) str += '★';
        if(nota % 1 !== 0) str += '½';
        return str;
    }

    async function carregarFeedGeral() {
        const containerFeed = document.getElementById('feed-lista');
        const loader = document.getElementById('loader-feed');
        containerFeed.innerHTML = '';
        loader.style.display = 'block';

        if (usuariosSeguidosGlobais.length === 0) {
            loader.style.display = 'none';
            containerFeed.innerHTML = `
                <div class="empty-state">
                    <h3>O Vazio Absoluto</h3>
                    <p>O seu feed está vazio. Encontre outros membros nas sombras e siga-os para ver as suas atividades.</p>
                </div>`;
            return;
        }

        try {
            let todosPosts = [];

            for (const amigo of usuariosSeguidosGlobais) {
                const resInteracoes = await fetch(`/interacoes/usuario/${amigo.id}`);
                if (resInteracoes.ok) {
                    const interacoesAmigo = await resInteracoes.json();
                    interacoesAmigo.forEach(interacao => {
                        todosPosts.push({ amigo: amigo, interacao: interacao });
                    });
                }
            }

            todosPosts.reverse();
            todosPosts = todosPosts.slice(0, 30); // Limite

            if(todosPosts.length === 0) {
                loader.style.display = 'none';
                containerFeed.innerHTML = '<div class="empty-state"><p>Silêncio total. Ninguém interagiu com nada recentemente.</p></div>';
                return;
            }

            for (const post of todosPosts) {
                const f = await getInfoFilme(post.interacao.idFilmeTmdb);
                if(!f.tituloExibicao) continue;

                const avatar = `https://ui-avatars.com/api/?name=${post.amigo.nome}&background=111&color=fff&size=100`;
                const poster = f.linkPoster || 'https://via.placeholder.com/150x225?text=Sem+Poster';

                let acaoDesc = "interagiu com o filme";
                if(post.interacao.status === 'QUERO_VER' && post.interacao.review && post.interacao.review.includes('[AGENDA]')) acaoDesc = "adicionou à Agenda o filme";
                else if(post.interacao.status === 'QUERO_VER') acaoDesc = "adicionou à Watchlist o filme";
                else if(post.interacao.status === 'JA_VI' && post.interacao.nota) acaoDesc = "avaliou";
                else if(post.interacao.status === 'JA_VI') acaoDesc = "marcou como visto";

                const estrelasHTML = post.interacao.nota ? `<div class="feed-stars">${gerarEstrelinhas(post.interacao.nota)}</div>` : '';
                const reviewHTML = post.interacao.review ? `<div class="feed-review">"${post.interacao.review}"</div>` : '';

                containerFeed.innerHTML += `
                    <div class="feed-item">
                        <div class="feed-avatar"><img src="${avatar}" loading="lazy" decoding="async"></div>
                        <div class="feed-content">
                            <div class="feed-header">
                                <strong onclick="window.location.href='library.html?amigoId=${post.amigo.id}'">@${post.amigo.nickname || post.amigo.nome.split(' ')[0].toLowerCase()}</strong> ${acaoDesc}
                            </div>

                            <div class="feed-movie-box" onclick="window.location.href='detalhes.html?id=${f.id || post.interacao.idFilmeTmdb}'">
                                <div class="feed-poster"><img src="${poster}" loading="lazy" decoding="async"></div>
                                <div class="feed-movie-info">
                                    <h3 class="feed-movie-title">${f.tituloExibicao}</h3>
                                    ${estrelasHTML}
                                </div>
                            </div>

                            ${reviewHTML}
                        </div>
                    </div>
                `;
            }

        } catch (error) {
            console.error(error);
        } finally {
            loader.style.display = 'none';
        }
    }
</script>
</body>
</html>
