<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade - Cinehub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-primaria: #a333ff;
            --cor-fundo: #14181c;
            --cor-card: #1b2228;
            --cor-texto: #ffffff;
            --cor-texto-sec: #8c9baf;
            --cor-borda: rgba(255, 255, 255, 0.1);
            --cor-ouro: #f5c518;
            --transicao: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--cor-fundo); color: var(--cor-texto);
            font-family: 'Inter', sans-serif; margin: 0; padding: 0 0 100px 0;
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        /* ======= HEADER ======= */
        .header-top { width: 100%; max-width: 1200px; padding: 40px 20px 20px 20px; display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .brand { text-decoration: none; transition: var(--transicao); display: flex; align-items: center; }
        .brand:hover { transform: scale(1.03); filter: brightness(1.2); }
        .brand-text { font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; margin: 0; color: #fff; display: flex; align-items: center; }
        .brand-text span { font-weight: 800; margin-left: 3px; background: linear-gradient(135deg, #fff 10%, var(--cor-primaria) 80%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; transition: var(--transicao); }

        .page-header { text-align: center; margin-bottom: 30px; padding: 0 20px; }
        .page-header h1 { font-size: 1.8rem; font-weight: 800; margin: 0 0 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px;}
        .page-header p { color: var(--cor-texto-sec); font-size: 0.9rem; margin: 0; font-weight: 400; }

        /* ======= MENU ABAS (BUSCAR / FEED) ======= */
        .tabs-comunidade {
            display: flex; gap: 15px; margin-bottom: 30px; background: var(--cor-card);
            padding: 8px; border-radius: 30px; border: 1px solid var(--cor-borda);
        }
        .tab-btn {
            background: transparent; border: none; color: var(--cor-texto-sec);
            padding: 10px 25px; border-radius: 20px; font-weight: 700; font-size: 0.9rem;
            cursor: pointer; transition: var(--transicao);
        }
        .tab-btn.active { background: var(--cor-primaria); color: #000; }

        /* ======= CONTEÚDO PRINCIPAL ======= */
        .comunidade-wrapper {
            width: 100%; max-width: 800px; padding: 0 20px;
            display: flex; flex-direction: column; gap: 40px;
        }

        .view-section { display: none; width: 100%; flex-direction: column; gap: 40px; }
        .view-section.active { display: flex; }

        .secao-titulo {
            width: 100%; border-bottom: 1px solid var(--cor-borda); padding-bottom: 10px;
            margin-bottom: 20px; color: var(--cor-primaria); font-weight: 800; font-size: 1.2rem;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* ======= ÁREA DE BUSCA ======= */
        .search-container { width: 100%; display: flex; gap: 8px; margin-bottom: 10px;}
        .search-container input {
            background: #232a31; border: 1px solid var(--cor-borda); border-radius: 20px;
            padding: 14px 25px; color: white; flex-grow: 1; font-size: 0.95rem; font-family: 'Inter', sans-serif;
            transition: var(--transicao);
        }
        .search-container input:focus { outline: none; border-color: var(--cor-primaria); }
        .btn-busca {
            background: var(--cor-primaria); border: none; border-radius: 20px;
            padding: 0 25px; color: #000; font-weight: 800; cursor: pointer; transition: var(--transicao);
        }

        /* ======= GRID USUÁRIOS ======= */
        .grid-usuarios { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; }
        .card-usuario {
            background-color: var(--cor-card); padding: 25px 20px; border-radius: 12px;
            text-align: center; border: 1px solid var(--cor-borda); transition: var(--transicao);
            display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .card-usuario:hover { border-color: var(--cor-primaria); transform: translateY(-5px); }

        .foto-perfil {
            width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 15px;
            background-color: #232a31; border: 2px solid var(--cor-borda); overflow: hidden;
        }
        .foto-perfil img { width: 100%; height: 100%; object-fit: cover; }
        .nome-user { font-weight: 800; font-size: 1.1rem; color: #fff; margin-bottom: 4px; display: block; }
        .nick-user { color: var(--cor-texto-sec); font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 20px; }

        .btn-seguir {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--cor-primaria);
            background: transparent; color: var(--cor-primaria); font-weight: 700; cursor: pointer;
            transition: var(--transicao); text-transform: uppercase; font-size: 0.8rem; margin-bottom: 10px;
        }
        .btn-seguir.seguindo { background-color: var(--cor-primaria); color: #000; }
        .btn-ver-diario {
            display: block; width: 100%; font-size: 0.8rem; font-weight: 600; color: var(--cor-texto-sec);
            text-decoration: none; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid transparent;
        }

        /* ======= FEED DE ATIVIDADE (NOVO) ======= */
        .feed-container { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .feed-item {
            background: var(--cor-card); border-radius: 12px; padding: 20px;
            border: 1px solid var(--cor-borda); display: flex; gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: var(--transicao);
        }
        .feed-item:hover { border-color: var(--cor-texto-sec); }

        .feed-avatar { width: 50px; height: 50px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid var(--cor-primaria);}
        .feed-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .feed-content { flex-grow: 1; display: flex; flex-direction: column; }
        .feed-header { font-size: 0.9rem; color: var(--cor-texto-sec); margin-bottom: 10px; line-height: 1.4;}
        .feed-header strong { color: #fff; font-size: 1rem; cursor: pointer; transition: var(--transicao);}
        .feed-header strong:hover { color: var(--cor-primaria); }

        .feed-movie-box {
            display: flex; gap: 15px; background: rgba(0,0,0,0.2); padding: 10px;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: var(--transicao);
        }
        .feed-movie-box:hover { background: rgba(255,255,255,0.05); }

        .feed-poster { width: 60px; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
        .feed-poster img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }

        .feed-movie-info { display: flex; flex-direction: column; justify-content: center;}
        .feed-movie-title { font-weight: 800; color: #fff; font-size: 1.1rem; margin: 0 0 5px 0;}
        .feed-stars { color: var(--cor-ouro); font-size: 0.8rem; letter-spacing: 2px;}

        .feed-review {
            margin-top: 15px; font-size: 0.95rem; color: #ddd; line-height: 1.5;
            padding-left: 15px; border-left: 3px solid var(--cor-primaria);
        }

        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--cor-primaria); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ======= NAV BOTTOM ======= */
        .nav-bottom { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: rgba(27, 34, 40, 0.9); backdrop-filter: blur(12px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--cor-borda); z-index: 1000; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        @media (min-width: 600px) { .nav-bottom { bottom: 20px; border-radius: 20px; border: 1px solid var(--cor-borda); } }
        .nav-bottom a { color: var(--cor-texto-sec); text-decoration: none; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: var(--transicao); }
        .nav-bottom a.active { color: var(--cor-primaria); }
        .nav-icon { font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="header-top">
    <a href="index.html" class="brand"><h1 class="brand-text">CINE<span>HUB</span></h1></a>
</div>

<div class="page-header">
    <h1>👥 Comunidade</h1>
    <p>Descubra o que os seus amigos estão a assistir.</p>
</div>

<div class="tabs-comunidade">
    <button class="tab-btn active" onclick="trocarAba('view-feed', this)">Feed de Atividade</button>
    <button class="tab-btn" onclick="trocarAba('view-busca', this)">Procurar & Seguir</button>
</div>

<div class="comunidade-wrapper">

    <div id="view-feed" class="view-section active">
        <div class="secao-titulo">Atividade Recente</div>
        <div id="loader-feed" class="loader"></div>
        <div class="feed-container" id="feed-lista">
        </div>
    </div>

    <div id="view-busca" class="view-section">
        <div class="search-container">
            <input type="text" id="input-nick" placeholder="Buscar por @nickname ou nome...">
            <button class="btn-busca" onclick="buscarUsuario()">Buscar</button>
        </div>

        <div id="container-resultado" style="display: none;">
            <div class="secao-titulo">Resultado da Busca</div>
            <div class="grid-usuarios" id="resultado-busca"></div>
        </div>

        <div style="margin-top: 20px;">
            <div class="secao-titulo">Pessoas que você segue</div>
            <div class="grid-usuarios" id="lista-seguindo">
                <p style="color: var(--cor-texto-sec); font-size: 0.9rem; text-align: center; width: 100%;">Você ainda não segue ninguém.</p>
            </div>
        </div>
    </div>

</div>

<nav class="nav-bottom">
    <a href="index.html"><span class="nav-icon">🔍</span>Home</a>
    <a href="library.html"><span class="nav-icon">📖</span>Library</a>
    <a href="calendario.html"><span class="nav-icon">📅</span>Agenda</a>
    <a href="comunidade.html" class="active"><span class="nav-icon">👥</span>Social</a>
    <a href="perfil.html"><span class="nav-icon">⚙️</span>Perfil</a>
</nav>

<script>
    const dadosLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
    if (!dadosLogado) window.location.href = 'login.html';
    if (dadosLogado && dadosLogado.corTema) { document.documentElement.style.setProperty('--cor-primaria', dadosLogado.corTema); }

    let usuariosSeguidosGlobais = [];
    let cacheFilmesFeed = {}; // Para evitar chamar a API do TMDB toda hora pro mesmo filme

    window.onload = async function() {
        await carregarQuemEuSigo();
        await carregarFeedGeral();
    };

    function trocarAba(idAlvo, elementoBtn) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(idAlvo).classList.add('active');
        elementoBtn.classList.add('active');
    }

    // ==========================================
    // LÓGICA DE SEGUIDORES E BUSCA
    // ==========================================
    async function carregarQuemEuSigo() {
        try {
            const res = await fetch(`/usuarios/${dadosLogado.id}/seguindo`);
            usuariosSeguidosGlobais = await res.json();
            renderizarListaSeguindo(usuariosSeguidosGlobais);
        } catch (e) { console.error(e); }
    }

    async function buscarUsuario() {
        const inputBusca = document.getElementById('input-nick').value.trim();
        const nick = inputBusca.replace('@', '');
        if (!nick) return;

        try {
            const res = await fetch(`/usuarios/busca/${nick}`);
            if (res.ok) {
                const user = await res.json();
                document.getElementById('container-resultado').style.display = 'block';
                renderizarResultado(user);
            } else {
                alert("Usuário não encontrado.");
                document.getElementById('container-resultado').style.display = 'none';
            }
        } catch (e) { console.error(e); }
    }

    function renderizarResultado(user) {
        const container = document.getElementById('resultado-busca');
        const idsSeguindo = new Set(usuariosSeguidosGlobais.map(u => u.id));
        const isSeguindo = idsSeguindo.has(user.id);
        const textoBotao = isSeguindo ? "Seguindo" : "Seguir";
        const classeBotao = isSeguindo ? "btn-seguir seguindo" : "btn-seguir";
        const displayBotao = user.id === dadosLogado.id ? 'none' : 'block';
        const avatarUrl = `https://ui-avatars.com/api/?name=${user.nome}&background=232a31&color=fff&size=100`;

        container.innerHTML = `
            <div class="card-usuario">
                <div class="foto-perfil"><img src="${avatarUrl}" alt="${user.nome}"></div>
                <span class="nome-user">${user.nome}</span>
                <span class="nick-user">@${user.nickname || user.nome.split(' ')[0].toLowerCase()}</span>
                <div class="botoes-card">
                    <button class="${classeBotao}" style="display: ${displayBotao}" onclick="toggleSeguir(${user.id})">${textoBotao}</button>
                    <a href="library.html?amigoId=${user.id}" class="btn-ver-diario">📖 Ver Library</a>
                </div>
            </div>`;
    }

    function renderizarListaSeguindo(lista) {
        const container = document.getElementById('lista-seguindo');
        if (lista.length === 0) {
            container.innerHTML = '<p style="color: var(--cor-texto-sec); text-align: center; width: 100%;">Você ainda não segue ninguém.</p>';
            return;
        }

        container.innerHTML = lista.map(user => {
            const avatarUrl = `https://ui-avatars.com/api/?name=${user.nome}&background=232a31&color=fff&size=100`;
            return `
                <div class="card-usuario">
                    <div class="foto-perfil"><img src="${avatarUrl}" alt="${user.nome}"></div>
                    <span class="nome-user">${user.nome}</span>
                    <span class="nick-user">@${user.nickname || user.nome.split(' ')[0].toLowerCase()}</span>
                    <div class="botoes-card">
                        <button class="btn-seguir seguindo" onclick="toggleSeguir(${user.id})">Seguindo</button>
                        <a href="library.html?amigoId=${user.id}" class="btn-ver-diario">📖 Ver Library</a>
                    </div>
                </div>`;
        }).join('');
    }

    async function toggleSeguir(seguidoId) {
        try {
            const res = await fetch(`/usuarios/${dadosLogado.id}/seguir/${seguidoId}`, { method: 'POST' });
            if (res.ok) {
                await carregarQuemEuSigo();
                await carregarFeedGeral(); // Recarrega o feed, já que seguiu/deixou de seguir
                const nickBusca = document.getElementById('input-nick').value.replace('@', '');
                if (nickBusca) buscarUsuario();
            }
        } catch (e) { console.error(e); }
    }

    // ==========================================
    // LÓGICA DO FEED DE ATIVIDADE
    // ==========================================
    async function getInfoFilme(idTmdb) {
        if (cacheFilmesFeed[idTmdb]) return cacheFilmesFeed[idTmdb];
        try {
            const res = await fetch(`/api/tmdb/${idTmdb}`);
            const f = await res.json();
            cacheFilmesFeed[idTmdb] = f;
            return f;
        } catch(e) { return {}; }
    }

    function gerarEstrelinhas(nota) {
        if (!nota) return '';
        let str = '';
        for(let i=1; i<=Math.floor(nota); i++) str += '★';
        if(nota % 1 !== 0) str += '½';
        return str;
    }

    async function carregarFeedGeral() {
        const containerFeed = document.getElementById('feed-lista');
        const loader = document.getElementById('loader-feed');
        containerFeed.innerHTML = '';
        loader.style.display = 'block';

        if (usuariosSeguidosGlobais.length === 0) {
            loader.style.display = 'none';
            containerFeed.innerHTML = `
                <div style="text-align:center; padding: 40px 20px; background: var(--cor-card); border-radius: 12px; border: 1px dashed var(--cor-borda);">
                    <h3 style="color: #fff;">Seu feed está vazio</h3>
                    <p style="color: var(--cor-texto-sec); font-size: 0.9rem;">Procure e siga amigos na aba ao lado para ver as atividades deles aqui.</p>
                </div>`;
            return;
        }

        try {
            let todosPosts = [];

            // Faz fetch das interações de CADA amigo seguido
            for (const amigo of usuariosSeguidosGlobais) {
                const resInteracoes = await fetch(`/interacoes/usuario/${amigo.id}`);
                if (resInteracoes.ok) {
                    const interacoesAmigo = await resInteracoes.json();

                    // Prepara o "Post" para a timeline
                    interacoesAmigo.forEach(interacao => {
                        todosPosts.push({
                            amigo: amigo,
                            interacao: interacao
                            // Idealmente, a sua API backend retornaria a data exata da interação.
                            // Como simulamos, a ordem do array será considerada cronológica.
                        });
                    });
                }
            }

            // Inverte para os mais recentes ficarem no topo
            todosPosts.reverse();

            // Limite de 30 posts no feed para não travar o navegador
            todosPosts = todosPosts.slice(0, 30);

            if(todosPosts.length === 0) {
                loader.style.display = 'none';
                containerFeed.innerHTML = '<p style="text-align:center; color: var(--cor-texto-sec);">Seus amigos ainda não adicionaram nenhum filme.</p>';
                return;
            }

            // Monta o HTML do Feed
            for (const post of todosPosts) {
                const f = await getInfoFilme(post.interacao.idFilmeTmdb);
                if(!f.tituloExibicao) continue;

                const avatar = `https://ui-avatars.com/api/?name=${post.amigo.nome}&background=232a31&color=fff&size=100`;
                const poster = f.linkPoster || 'https://via.placeholder.com/150x225?text=Sem+Poster';

                // Texto Descritivo da Ação
                let acaoDesc = "interagiu com o filme";
                if(post.interacao.status === 'QUERO_VER' && post.interacao.review && post.interacao.review.includes('[AGENDA]')) acaoDesc = "adicionou à Agenda o filme";
                else if(post.interacao.status === 'QUERO_VER') acaoDesc = "adicionou à Watchlist o filme";
                else if(post.interacao.status === 'JA_VI' && post.interacao.nota) acaoDesc = "avaliou";
                else if(post.interacao.status === 'JA_VI') acaoDesc = "marcou como visto";

                const estrelasHTML = post.interacao.nota ? `<div class="feed-stars">${gerarEstrelinhas(post.interacao.nota)}</div>` : '';
                const reviewHTML = post.interacao.review ? `<div class="feed-review">"${post.interacao.review}"</div>` : '';

                containerFeed.innerHTML += `
                    <div class="feed-item">
                        <div class="feed-avatar"><img src="${avatar}"></div>
                        <div class="feed-content">
                            <div class="feed-header">
                                <strong onclick="window.location.href='library.html?amigoId=${post.amigo.id}'">@${post.amigo.nickname || post.amigo.nome.split(' ')[0].toLowerCase()}</strong> ${acaoDesc}
                            </div>

                            <div class="feed-movie-box" onclick="window.location.href='detalhes.html?id=${f.id || post.interacao.idFilmeTmdb}'">
                                <div class="feed-poster"><img src="${poster}"></div>
                                <div class="feed-movie-info">
                                    <h3 class="feed-movie-title">${f.tituloExibicao}</h3>
                                    ${estrelasHTML}
                                </div>
                            </div>

                            ${reviewHTML}
                        </div>
                    </div>
                `;
            }

        } catch (error) {
            console.error(error);
        } finally {
            loader.style.display = 'none';
        }
    }
</script>
</body>
</html>
