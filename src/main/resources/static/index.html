<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cinehub - Discovery</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020202">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/a333ff/ffffff?text=CH">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cinehub">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-primaria: #8a0303;
            --cor-fundo: #020202;
            --cor-card: #0d0d0f;
            --cor-texto: #dfdfdf;
            --cor-texto-sec: #6c757d;
            --cor-sucesso: #2d8a56;
            --cor-alerta: #b0a02c;
            --cor-perigo: #8a0303;
            --cor-ouro: #c0a062;
            --cor-borda: #1a1a1a;
            --transicao: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--cor-fundo); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; border: 1px solid var(--cor-fundo); }
        ::-webkit-scrollbar-thumb:hover { background: var(--cor-primaria); }

        body {
            background-color: var(--cor-fundo); color: var(--cor-texto);
            font-family: 'Inter', sans-serif; margin: 0; padding: 0 0 50px 0;
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ======= TOP NAV ======= */
        .top-nav {
            width: 100%; position: sticky; top: 0; background-color: rgba(2, 2, 2, 0.98);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--cor-borda);
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; z-index: 1000;
        }

        .btn-hamburger { background: transparent; border: none; color: var(--cor-texto); font-size: 1.5rem; cursor: pointer; padding: 0; display: flex; align-items: center; transition: var(--transicao); }
        .btn-hamburger:hover { color: var(--cor-primaria); transform: scale(1.1); }

        .brand { text-decoration: none; display: flex; align-items: center; position: absolute; left: 50%; transform: translateX(-50%);}
        .brand-text { font-size: 1.4rem; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; margin: 0; color: #fff; }
        .brand-text span { color: var(--cor-primaria); }

        /* ======= MENU LATERAL ======= */
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1999; opacity: 0; pointer-events: none; transition: var(--transicao); backdrop-filter: blur(4px); }
        .menu-overlay.open { opacity: 1; pointer-events: auto; }

        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #08080a; z-index: 2000; border-right: 1px solid var(--cor-borda); display: flex; flex-direction: column; padding: 30px 20px; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); box-shadow: 10px 0 40px rgba(0,0,0,0.9); }
        .side-menu.open { left: 0; }

        .side-menu-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--cor-borda); padding-bottom: 20px; margin-bottom: 20px; }
        .side-menu-header h2 { margin: 0; font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; color: #fff; text-transform: uppercase;}
        .btn-close-menu { background: transparent; border: none; color: var(--cor-texto-sec); font-size: 1.3rem; cursor: pointer; transition: var(--transicao); }
        .btn-close-menu:hover { color: var(--cor-perigo); transform: rotate(90deg); }

        .menu-links { display: flex; flex-direction: column; gap: 5px; }
        .menu-links a { color: var(--cor-texto); text-decoration: none; font-size: 1rem; font-weight: 500; padding: 14px 12px; border-radius: 2px; transition: var(--transicao); display: flex; align-items: center; gap: 15px; border: 1px solid transparent; }
        .menu-links a:hover, .menu-links a.active { background: rgba(255,255,255,0.02); color: #fff; border-color: var(--cor-borda); }
        .menu-links a.active { border-color: var(--cor-primaria); color: var(--cor-primaria); font-weight: 700;}
        .menu-icon { font-size: 1.1rem; opacity: 0.6;}

        /* BUSCA INTEGRADA */
        .search-wrapper { width: 100%; max-width: 1200px; padding: 30px 20px; display: flex; justify-content: center; }
        .search-container { width: 100%; max-width: 700px; display: flex; gap: 8px; position: relative;}
        .search-container input { background: #050505; border: 1px solid var(--cor-borda); border-radius: 2px; padding: 16px 25px; color: white; flex-grow: 1; font-size: 0.95rem; font-family: 'Inter', sans-serif; transition: var(--transicao); }
        .search-container input:focus { outline: none; border-color: var(--cor-primaria); box-shadow: 0 0 15px rgba(138, 3, 3, 0.2); }
        .btn-busca { background: var(--cor-texto); border: none; border-radius: 2px; padding: 0 25px; color: #000; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: var(--transicao); font-size: 0.8rem;}
        .btn-busca:hover { background: var(--cor-primaria); color: #fff; }

        /* ======= SEÇÕES ======= */
        #home-view { width: 100%; max-width: 1300px; position: relative; }
        .secao-tmdb { margin-bottom: 40px; position: relative; }
        .secao-header { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; padding: 0 25px; border-bottom: 1px solid var(--cor-borda); padding-bottom: 10px; }
        .secao-titulo { font-size: 1rem; font-weight: 700; color: #fff; margin: 0; letter-spacing: 1.5px; text-transform: uppercase; }

        .toggle-tmdb { display: flex; background: #000; border: 1px solid var(--cor-borda); border-radius: 2px; overflow: hidden; }
        .toggle-btn { background: transparent; border: none; color: var(--cor-texto-sec); font-weight: 600; padding: 6px 15px; font-size: 0.75rem; cursor: pointer; transition: var(--transicao); text-transform: uppercase; letter-spacing: 1px;}
        .toggle-btn:hover { color: #fff; }
        .toggle-btn.active { background: var(--cor-primaria); color: #fff; font-weight: 700;}

        /* ======= CARROSSEL E SETAS ======= */
        .carrossel-wrapper { position: relative; width: 100%; }

        /* MUDANÇA VIP: Altura mínima para evitar o "pulo" da tela */
        .carrossel { display: flex; gap: 15px; overflow-x: auto; padding: 10px 25px 35px 25px; scrollbar-width: none; scroll-behavior: smooth; cursor: grab; min-height: 330px; align-items: stretch; }

        .carrossel:active { cursor: grabbing; scroll-behavior: auto; }
        .carrossel::-webkit-scrollbar { display: none; }
        .seta-carrossel { position: absolute; top: 40%; transform: translateY(-50%); width: 45px; height: 45px; background: rgba(0, 0, 0, 0.9); color: white; border: 1px solid var(--cor-borda); border-radius: 2px; font-size: 1.5rem; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; opacity: 0; transition: var(--transicao); box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        @media (min-width: 768px) { .carrossel-wrapper:hover .seta-carrossel { opacity: 1; } }
        @media (max-width: 767px) { .seta-carrossel { display: none; } }
        .seta-carrossel:hover { background: var(--cor-primaria); border-color: var(--cor-primaria); }
        .seta-esq { left: 10px; } .seta-dir { right: 10px; }

        /* LOADING CENTRALIZADO NO CARROSSEL */
        .loader-box { width: 100%; display: flex; justify-content: center; align-items: center; height: 260px; color: var(--cor-texto-sec); font-style: italic; font-size: 0.9rem;}

        /* ======= CARD TMDB COMPLETO ======= */
        .card-tmdb { flex: 0 0 140px; display: flex; flex-direction: column; cursor: pointer; position: relative; transition: var(--transicao); overflow: visible; }
        .card-tmdb:hover { transform: translateY(-5px); }
        .poster-container { position: relative; width: 100%; pointer-events: none; border-radius: 4px;}
        .poster-container img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 4px; display: block; background-color: #000; border: 1px solid var(--cor-borda); transition: var(--transicao);}
        .card-tmdb:hover .poster-container img { border-color: var(--cor-primaria); box-shadow: 0 5px 20px rgba(138, 3, 3, 0.25); filter: contrast(110%); }

        .btn-adicionar-card { pointer-events: auto; position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; background: rgba(0,0,0,0.9); border: 1px solid var(--cor-borda); color: #fff; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 900; cursor: pointer; transition: var(--transicao); z-index: 5; opacity: 0; }
        .card-tmdb:hover .btn-adicionar-card { opacity: 1; }
        .btn-adicionar-card:hover { background: var(--cor-primaria); border-color: var(--cor-primaria); transform: scale(1.1); }

        .nota-donut { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.6rem; font-weight: 800; background: #000 !important; border: 2px solid var(--cor-anel); z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,0.8); }
        .simbolo-porcento { font-size: 0.35rem; margin-top: 1px;}

        .info-container { padding: 18px 5px 12px 5px; flex-grow: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .info-titulo { font-size: 0.85rem; font-weight: 700; margin: 0 0 4px 0; color: #fff; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; pointer-events: none; }
        .info-data { font-size: 0.7rem; color: var(--cor-texto-sec); margin: 0; pointer-events: none; font-family: 'Georgia', serif;}

        .card-ver-todos { flex: 0 0 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; border-radius: 4px; background-color: rgba(255,255,255,0.01); border: 1px dashed var(--cor-texto-sec); transition: var(--transicao); color: var(--cor-texto-sec); gap: 10px; height: 210px; margin-top: 1px;}
        .card-ver-todos:hover { border-color: #fff; color: #fff; background-color: rgba(255,255,255,0.03); transform: translateY(-5px); }
        .seta-ver-todos { font-size: 2rem; font-weight: 200; }
        .texto-ver-todos { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        #busca-view { display: none; width: 100%; max-width: 1200px; padding: 20px; }
        .grid-busca { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; padding: 20px 0; }
        .btn-voltar { background: transparent; border: 1px solid var(--cor-borda); color: var(--cor-texto-sec); padding: 10px 20px; border-radius: 2px; font-size: 0.8rem; font-weight: 700; cursor: pointer; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; transition: var(--transicao);}
        .btn-voltar:hover { border-color: #fff; color: #fff; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(3px); transition: var(--transicao); }
        .modal-content { background: #050505; width: 90%; max-width: 400px; padding: 30px; border-radius: 4px; border: 1px solid var(--cor-borda); animation: fadeInModal 0.4s cubic-bezier(0.19, 1, 0.22, 1); max-height: 95vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,1);}
        @keyframes fadeInModal { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .close-btn { float: right; font-size: 1.3rem; cursor: pointer; color: var(--cor-texto-sec); transition: var(--transicao); line-height: 1; }
        .close-btn:hover { color: var(--cor-perigo); transform: rotate(90deg); }
        .modal-form label { font-size: 0.65rem; font-weight: 700; color: var(--cor-texto-sec); display: block; margin-bottom: 6px; letter-spacing: 1.5px; margin-top: 18px; text-transform: uppercase;}
        .modal-form select, .modal-form input, .modal-form textarea { background: #000; border: 1px solid var(--cor-borda); color: white; padding: 12px; border-radius: 2px; width: 100%; font-family: 'Inter', sans-serif; font-size: 0.9rem; transition: var(--transicao); }
        .modal-form select:focus, .modal-form input:focus, .modal-form textarea:focus { outline: none; border-color: var(--cor-primaria); box-shadow: 0 0 10px rgba(138, 3, 3, 0.2); }

        .btn-salvar-modal { background: var(--cor-texto); border: none; color: #000; padding: 14px; border-radius: 2px; font-weight: 800; width: 100%; cursor: pointer; font-size: 0.85rem; margin-top: 30px; transition: var(--transicao); text-transform: uppercase; letter-spacing: 1.5px; }
        .btn-salvar-modal:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2);}

        #modal-countdown { background: #000; color: #fff; padding: 15px; border-radius: 2px; text-align: center; font-weight: 800; margin: 15px 0 10px 0; font-size: 0.95rem; border: 1px solid var(--cor-primaria); box-shadow: 0 0 15px rgba(138,3,3,0.1);}
    </style>
</head>
<body>

<header class="top-nav">
    <button class="btn-hamburger" onclick="toggleMenu()">☰</button>
    <a href="index.html" class="brand"><h1 class="brand-text">CINE<span>HUB</span></h1></a>
    <div style="width: 24px;"></div>
</header>

<div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
<nav class="side-menu" id="side-menu">

        <h2>CINEHUB</h2>
        <button class="btn-close-menu" onclick="toggleMenu()">✕</button>
    </div>
    <div class="menu-links">
        <a href="index.html" class="active"><span class="menu-icon">🏠</span> Home</a>
        <a href="library.html"><span class="menu-icon">📖</span> Library</a>
        <a href="calendario.html"><span class="menu-icon">📅</span> Agenda</a>

<div class="search-wrapper">
    <div class="search-container">
        <input type="text" id="input-busca" placeholder="Buscar filmes, séries ou atores...">
        <button class="btn-busca" onclick="executarBusca()">Pesquisar</button>
    </div>
</div>

<div id="home-view">
    <div class="secao-tmdb">
        <div class="secao-header">
            <h2 class="secao-titulo">Os Mais Populares</h2>
            <div class="toggle-tmdb">
                <button class="toggle-btn active" id="btn-pop-movie" onclick="trocarLista('popular', 'movie', 'carrossel-pop', 'btn-pop-movie', 'btn-pop-tv')">Filmes</button>
                <button class="toggle-btn" id="btn-pop-tv" onclick="trocarLista('popular', 'tv', 'carrossel-pop', 'btn-pop-tv', 'btn-pop-movie')">Séries</button>
            </div>

    <div class="secao-tmdb">
        <div class="secao-header">
            <h2 class="secao-titulo">Próximas Estreias</h2>
        </div>
        <div class="carrossel-wrapper">
            <button class="seta-carrossel seta-esq" onclick="rolarCarrossel('carrossel-upcoming', -1)">&#10094;</button>
            <div class="carrossel drag-scroll" id="carrossel-upcoming"></div>
            <button class="seta-carrossel seta-dir" onclick="rolarCarrossel('carrossel-upcoming', 1)">&#10095;</button>
        </div>
    </div>

    <div class="secao-tmdb">
        <div class="secao-header">
            <h2 class="secao-titulo">Em Cartaz</h2>
        </div>
        <div class="carrossel-wrapper">
            <button class="seta-carrossel seta-esq" onclick="rolarCarrossel('carrossel-cartaz', -1)">&#10094;</button>
            <div class="carrossel drag-scroll" id="carrossel-cartaz"></div>
            <button class="seta-carrossel seta-dir" onclick="rolarCarrossel('carrossel-cartaz', 1)">&#10095;</button>
        </div>
    </div>

    <div class="secao-tmdb">
        <div class="secao-header">
            <h2 class="secao-titulo">Popular Awards</h2>
            <div class="toggle-tmdb">
                <button class="toggle-btn active" id="btn-awards-movie" onclick="trocarLista('top_rated', 'movie', 'carrossel-awards', 'btn-awards-movie', 'btn-awards-tv')">Filmes</button>
                <button class="toggle-btn" id="btn-awards-tv" onclick="trocarLista('top_rated', 'tv', 'carrossel-awards', 'btn-awards-tv', 'btn-awards-movie')">Séries</button>
            </div>
        </div>
        <div class="carrossel-wrapper">
            <button class="seta-carrossel seta-esq" onclick="rolarCarrossel('carrossel-awards', -1)">&#10094;</button>
            <div class="carrossel drag-scroll" id="carrossel-awards"></div>
            <button class="seta-carrossel seta-dir" onclick="rolarCarrossel('carrossel-awards', 1)">&#10095;</button>

</div>

<div id="busca-view">
    <button class="btn-voltar" onclick="fecharBusca()">← Voltar para Home</button>

</div>

<div id="modal-adicao" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModal()">&times;</span>

            <div id="campos-diario">

                <select id="modal-idioma"><option value="">Selecione...</option><option value="Dublado">Dublado</option><option value="Legendado">Legendado</option><option value="Original">Original</option></select>

                    <option value="Cinema">🍿 Cinema</option>

        </div>

</div>

<script>
    function toggleMenu() {
        const menu = document.getElementById('side-menu');
        const overlay = document.getElementById('menu-overlay');
        menu.classList.toggle('open');
        overlay.classList.toggle('open');
        if(menu.classList.contains('open')) {
            document.body.style.overflow = 'hidden';
        } else {
            document.body.style.overflow = 'auto';
        }
    }

    const dadosUser = JSON.parse(localStorage.getItem('usuarioLogado'));
    if (dadosUser && dadosUser.corTema) { document.documentElement.style.setProperty('--cor-primaria', dadosUser.corTema); }
    if (!dadosUser) window.location.href = 'login.html';

    const placeholderImagem = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='500' height='750' style='background:%23000'%3E%3Ctext fill='%236c757d' x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='24'%3ESem Foto%3C/text%3E%3C/svg%3E";

    const HOJE = new Date(2026, 2, 31);

    window.onload = function() {
        carregarSecao('popular', 'movie', 'carrossel-pop');
        carregarSecao('upcoming', 'movie', 'carrossel-upcoming');
        carregarSecao('now_playing', 'movie', 'carrossel-cartaz');
        carregarSecao('top_rated', 'movie', 'carrossel-awards');
        ativarDragScroll();
    };

    function rolarCarrossel(idCarrossel, direcao) {
        const carrossel = document.getElementById(idCarrossel);
        const distancia = (carrossel.clientWidth - 100) * direcao;
        carrossel.scrollBy({ left: distancia, behavior: 'smooth' });
    }

    function ativarDragScroll() {
        const sliders = document.querySelectorAll('.drag-scroll');
        let isDown = false, startX, scrollLeft;
        sliders.forEach(slider => {
            slider.addEventListener('mousedown', (e) => { isDown = true; slider.classList.add('active'); startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
            slider.addEventListener('mouseleave', () => { isDown = false; slider.classList.remove('active'); });
            slider.addEventListener('mouseup', () => { isDown = false; slider.classList.remove('active'); });
            slider.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - slider.offsetLeft; const walk = (x - startX) * 2; slider.scrollLeft = scrollLeft - walk; });
        });
    }

    function formatarData(dataString) {
        if (!dataString) return '';
        const meses = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
        const partes = dataString.split('-');
        if (partes.length !== 3) return dataString;
        return `${partes[2]} de ${meses[parseInt(partes[1]) - 1]} de ${partes[0]}`;
    }

    function trocarLista(cat, tipo, containerId, btnAtivoId, btnInativoId) {
        document.getElementById(btnAtivoId).classList.add('active');
        document.getElementById(btnInativoId).classList.remove('active');
        carregarSecao(cat, tipo, containerId);
    }

    async function carregarSecao(cat, tipo, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '<div class="loader-box">Buscando nas sombras...</div>';
        try {
            const response = await fetch(`/api/tmdb/lista?cat=${cat}&tipo=${tipo}`);
            let filmes = await response.json();

            if (cat === 'upcoming') {
                filmes = filmes.filter(f => {
                    if (!f.dataExibicao) return false;
                    const p = f.dataExibicao.split('-');
                    const dataFilme = new Date(p[0], p[1] - 1, p[2]);
                    return dataFilme > HOJE;
                });
                filmes.sort((a, b) => new Date(a.dataExibicao) - new Date(b.dataExibicao));
            }

            const filmesExibidos = filmes.slice(0, 20);
            let html = gerarHTMLCards(filmesExibidos);
            html += `<div class="card-ver-todos" onclick="window.location.href='lista_completa.html?cat=${cat}&tipo=${tipo}'"><span class="seta-ver-todos">→</span><span class="texto-ver-todos">Ver todos</span></div>`;
            container.innerHTML = html;
        } catch (e) { container.innerHTML = '<p style="color: var(--cor-perigo); padding: 20px;">Erro ao carregar.</p>'; }
    }

    async function executarBusca() {
        const query = document.getElementById('input-busca').value;
        if (!query) return;
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('busca-view').style.display = 'block';
        document.getElementById('titulo-busca').innerText = `Resultados para: "${query}"`;
        const grid = document.getElementById('grid-resultados');
        grid.innerHTML = '<div class="loader-box" style="grid-column: 1/-1;">Rastreando...</div>';
        const response = await fetch(`/api/tmdb/busca?titulo=${query}`);
        const filmes = await response.json();
        grid.innerHTML = gerarHTMLCards(filmes);
    }

    function fecharBusca() {
        document.getElementById('busca-view').style.display = 'none';
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('input-busca').value = '';
    }

    function gerarHTMLCards(filmes) {
        if(filmes.length === 0) return '<p style="color: var(--cor-texto-sec); font-style: italic; grid-column: 1/-1; padding: 20px;">Nenhum título encontrado.</p>';
        return filmes.map(filme => {
            let valorNota = filme.notaTmdb || filme.vote_average || filme.voteAverage || 0;
            const porcentagemNum = valorNota > 0 ? (valorNota * 10).toFixed(0) : 0;
            let corAnel = 'var(--cor-texto-sec)';
            if (valorNota >= 7) corAnel = 'var(--cor-sucesso)';
            else if (valorNota >= 5) corAnel = 'var(--cor-alerta)';

            let conteudoNota = `<span class="nota-valor">NR</span>`;
            if (porcentagemNum > 0) conteudoNota = `<span class="nota-valor">${porcentagemNum}</span><span class="simbolo-porcento">%</span>`;
            const dataFormatada = formatarData(filme.dataExibicao);
            const dataPura = filme.dataExibicao || '';

            return `
                <div class="card-tmdb"
                     onmousedown="window.startX = event.pageX;"
                     onmouseup="if(Math.abs(event.pageX - window.startX) < 5) window.location.href='detalhes.html?id=${filme.id}'">
                    <div class="poster-container">
                        <img src="${filme.linkPoster ? filme.linkPoster : placeholderImagem}" alt="${filme.tituloExibicao}" onerror="this.src='${placeholderImagem}'" loading="lazy" decoding="async" draggable="false">
                        <button class="btn-adicionar-card"
                                onmousedown="event.stopPropagation();"
                                onmouseup="event.stopPropagation();"
                                onclick="event.preventDefault(); event.stopPropagation(); abrirModalAdicao('${filme.id}', '${filme.tituloExibicao.replace(/'/g, "\\'")}', '${dataPura}')"
                                title="Adicionar">+</button>
                        <div class="nota-donut" style="border-color: ${corAnel};">
                            <span>${conteudoNota}</span>
                        </div>
                    </div>
                    <div class="info-container">
                        <h3 class="info-titulo" title="${filme.tituloExibicao}">${filme.tituloExibicao}</h3>
                        <p class="info-data">${dataFormatada}</p>
                    </div>
                </div>
            `;
        }).join('');
    }

    function abrirModalAdicao(idTmdb, titulo, dataEstreia) {
        document.getElementById('modal-id-tmdb').value = idTmdb;
        document.getElementById('modal-titulo').innerText = titulo;

        document.getElementById('modal-status').value = "QUERO_VER";
        document.getElementById('modal-idioma').value = "";
        document.getElementById('modal-nota').value = "";
        document.getElementById('modal-tags').value = "";
        document.getElementById('modal-review').value = "";

        let dataFilme = null;
        if (dataEstreia && dataEstreia.length > 0) {
            const p = dataEstreia.split('-');
            dataFilme = new Date(p[0], p[1] - 1, p[2]);
        }

        const eFuturo = dataFilme && dataFilme > HOJE;

        if (eFuturo) {
            document.getElementById('campos-diario').style.display = 'none';
            document.getElementById('campos-agenda').style.display = 'block';
            document.getElementById('btn-acao-modal').innerText = "SALVAR NA AGENDA";

            const diffTime = Math.abs(dataFilme - HOJE);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('modal-countdown').innerHTML = `📅 Faltam ${diffDays} dias para a estreia!`;
        } else {
            document.getElementById('campos-diario').style.display = 'block';
            document.getElementById('campos-agenda').style.display = 'none';
            document.getElementById('btn-acao-modal').innerText = "SALVAR NO DIÁRIO";
        }

        document.getElementById('modal-adicao').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modal-adicao').style.display = 'none'; }

    window.onclick = function(event) {
        if (event.target == document.getElementById('modal-adicao')) fecharModal();
        if (event.target == document.getElementById('menu-overlay')) toggleMenu();
    }

    async function salvarNoDiario() {
        const isAgenda = document.getElementById('campos-agenda').style.display === 'block';
        let interactionStatus = "QUERO_VER";
        let interactionReview = document.getElementById('modal-review').value;

        if(isAgenda) {
            const hype = document.getElementById('modal-hype').value;
            const local = document.getElementById('modal-local').value;
            interactionReview = `[AGENDA] Expectativa: ${hype} | Onde: ${local}`;
        } else {
            interactionStatus = document.getElementById('modal-status').value;
        }

        const payload = {
            idFilmeTmdb: document.getElementById('modal-id-tmdb').value,
            status: interactionStatus,
            idiomaAudio: document.getElementById('modal-idioma').value,
            nota: document.getElementById('modal-nota').value ? parseFloat(document.getElementById('modal-nota').value) : null,
            tags: document.getElementById('modal-tags').value,
            review: interactionReview
        };

        const response = await fetch(`/interacoes/usuario/${dadosUser.id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (response.ok) fecharModal();
    }
</script>
