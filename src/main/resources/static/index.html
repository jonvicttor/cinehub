<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinehub - Discovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-primaria: #a333ff; /* Roxo neon mais vibrante da imagem */
            --cor-fundo: #14181c;
            --cor-card: #1b2228;
            --cor-texto: #ffffff;
            --cor-texto-sec: #8c9baf;
            --cor-sucesso: #21d07a;
            --cor-alerta: #d2d531;
            --cor-perigo: #db2360;
            --cor-borda: rgba(255, 255, 255, 0.1);
            --transicao: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--cor-fundo); color: var(--cor-texto);
            font-family: 'Inter', sans-serif; margin: 0; padding: 0 0 90px 0;
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ======= HEADER E BRANDING (ATUALIZADO) ======= */
        .header-top {
            width: 100%; max-width: 1200px; padding: 40px 20px 20px 20px;
            display: flex; flex-direction: column; align-items: center; gap: 25px;
        }

        .brand {
            text-decoration: none;
            transition: var(--transicao);
            display: flex;
            align-items: center;
        }
        .brand:hover { transform: scale(1.03); }

        .brand-text {
            font-size: rem; /* Tamanho imponente */
            font-weight: 900; /* Super Negrito para CINE */
            letter-spacing: 4px; /* Espaçamento tecnológico */
            text-transform: uppercase;
            margin: 0;
            color: #fff;
            display: flex;
            align-items: center;
        }

        .brand-text span {
    font-weight: 800; /* HUB grosso como solicitado */
    margin-left: 3px;
    background: linear-gradient(135deg, #fff 10%, var(--cor-primaria) 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

        /* BUSCA INTEGRADA */
        .search-container { width: 100%; max-width: 600px; display: flex; gap: 8px; }
        .search-container input {
            background: #232a31; border: 1px solid var(--cor-borda); border-radius: 20px;
            padding: 12px 25px; color: white; flex-grow: 1; font-size: 0.95rem; font-family: 'Inter', sans-serif;
            transition: var(--transicao);
        }
        .search-container input:focus { outline: none; border-color: var(--cor-primaria); box-shadow: 0 0 15px rgba(163, 51, 255, 0.2); }
        .btn-busca {
            background: var(--cor-primaria); border: none; border-radius: 20px;
            padding: 0 25px; color: white; font-weight: 700; cursor: pointer;
            transition: var(--transicao);
        }
        .btn-busca:hover { filter: brightness(1.2); }

        /* ======= SEÇÕES ESTILO TMDB ======= */
        #home-view { width: 100%; max-width: 1300px; position: relative; }
        .secao-tmdb { margin-bottom: 30px; position: relative; }
        .secao-header { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; padding: 0 25px; }
        .secao-titulo { font-size: 1.3rem; font-weight: 700; margin: 0; color: #fff; }
        .toggle-tmdb { display: flex; background: transparent; border: 1px solid var(--cor-primaria); border-radius: 20px; overflow: hidden; }
        .toggle-btn { background: transparent; border: none; color: var(--cor-texto); font-weight: 600; padding: 6px 15px; font-size: 0.8rem; cursor: pointer; transition: var(--transicao); }
        .toggle-btn.active { background: var(--cor-primaria); color: #fff; }

        /* ======= CARROSSEL E SETAS ======= */
        .carrossel-wrapper { position: relative; width: 100%; }
        .carrossel {
            display: flex; gap: 20px; overflow-x: auto;
            padding: 15px 25px 35px 25px;
            scrollbar-width: none; scroll-behavior: smooth; cursor: grab;
        }
        .carrossel:active { cursor: grabbing; scroll-behavior: auto; }
        .carrossel::-webkit-scrollbar { display: none; }

        .seta-carrossel {
            position: absolute; top: 40%; transform: translateY(-50%);
            width: 45px; height: 45px; background: rgba(0, 0, 0, 0.7);
            color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%;
            font-size: 1.5rem; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: var(--transicao); box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        @media (min-width: 768px) {
            .carrossel-wrapper:hover .seta-carrossel { opacity: 1; border-color: rgba(255,255,255,0.5); }
        }
        @media (max-width: 767px) { .seta-carrossel { display: none; } }
        .seta-carrossel:hover { background: var(--cor-primaria); transform: translateY(-50%) scale(1.1); border-color: var(--cor-primaria); opacity: 1; }
        .seta-esq { left: 10px; }
        .seta-dir { right: 10px; }

        /* ======= CARD TMDB COMPLETO ======= */
        .card-tmdb {
            flex: 0 0 150px; display: flex; flex-direction: column; cursor: pointer; position: relative;
            border-radius: 8px; background-color: var(--cor-card);
            border: 1px solid rgba(255, 255, 255, 0.05); transition: var(--transicao); overflow: visible;
        }
        .card-tmdb:hover { transform: translateY(-8px) scale(1.02); border-color: var(--cor-primaria); box-shadow: 0 12px 30px rgba(128, 0, 128, 0.5); }

        .poster-container { position: relative; width: 100%; pointer-events: none; }
        .poster-container img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-top-left-radius: 8px; border-top-right-radius: 8px; display: block; background-color: #232a31; }

        /* NOTA INTEGRADA NO CARD */
        .nota-donut {
            position: absolute; bottom: -18px; left: 10px; width: 36px; height: 36px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 0.7rem; font-weight: 800; box-shadow: 0 0 0 2px #081c22;
            background: conic-gradient(
                var(--cor-anel) var(--progresso, 0%),
                rgba(255,255,255,0.1) var(--progresso, 0%)
            );
        }
        .nota-donut::after {
            content: ""; position: absolute; inset: 3px;
            background-color: #081c22; border-radius: 50%;
        }
        .nota-donut span { z-index: 2; position: relative; font-size: 0.7rem; display: flex;}
        .nota-donut .simbolo-porcento { font-size: 0.4rem; margin-top: 1px;}

        /* INFO CONTAINER */
        .info-container { padding: 25px 10px 12px 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        .info-titulo { font-size: 0.9rem; font-weight: 700; margin: 0 0 4px 0; color: #fff; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; pointer-events: none; }
        .info-data { font-size: 0.8rem; color: var(--cor-texto-sec); margin: 0; pointer-events: none; }

        /* ======== CARD "VER TODOS" ======== */
        .card-ver-todos {
            flex: 0 0 150px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; border-radius: 8px; background-color: rgba(255,255,255,0.02);
            border: 1px dashed var(--cor-texto-sec); transition: var(--transicao); color: var(--cor-texto-sec); gap: 10px;
        }
        .card-ver-todos:hover {
            border-color: #fff; color: #fff; background-color: rgba(255,255,255,0.05); transform: translateY(-5px);
        }
        .seta-ver-todos { font-size: 2rem; font-weight: 200; }
        .texto-ver-todos { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        /* BUSCA VIEW */
        #busca-view { display: none; width: 100%; max-width: 1200px; padding: 20px; }
        .grid-busca { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px 0; }
        .btn-voltar { background: transparent; border: 1px solid var(--cor-texto-sec); color: var(--cor-texto-sec); padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; margin-bottom: 20px; }

        /* NAV E MODAL */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: rgba(27, 34, 40, 0.9); backdrop-filter: blur(12px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--cor-borda); z-index: 1000; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        @media (min-width: 600px) { .nav-bottom { bottom: 20px; border-radius: 20px; border: 1px solid var(--cor-borda); } }
        .nav-bottom a { color: var(--cor-texto-sec); text-decoration: none; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: var(--transicao); }
        .nav-bottom a.active { color: var(--cor-primaria); }
        .nav-icon { font-size: 1.2rem; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--cor-card); width: 90%; max-width: 400px; padding: 25px; border-radius: 12px; border: 1px solid var(--cor-borda); animation: slideUp 0.3s ease; max-height: 90vh; overflow-y: auto; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-btn { float: right; font-size: 1.5rem; cursor: pointer; color: var(--cor-texto-sec); line-height: 1; }
        .modal-form label { font-size: 0.75rem; font-weight: 600; color: var(--cor-texto-sec); display: block; margin-bottom: 6px; margin-top: 15px;}
        .modal-form select, .modal-form input, .modal-form textarea { background: #232a31; border: 1px solid #344150; color: white; padding: 10px 14px; border-radius: 6px; width: 100%; font-family: 'Inter', sans-serif; font-size: 0.95rem; }
        .modal-form select:focus, .modal-form input:focus, .modal-form textarea:focus { outline: none; border-color: var(--cor-primaria); background: #2c3440; }
        .btn-salvar-modal { background: var(--cor-sucesso); border: none; color: #000; padding: 14px; border-radius: 6px; font-weight: 800; width: 100%; cursor: pointer; font-size: 0.9rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header-top">
    <a href="index.html" class="brand">
        <h1 class="brand-text">CINE<span>HUB</span></h1>
    </a>
    <div class="search-container">
        <input type="text" id="input-busca" placeholder="Buscar filmes, séries ou atores...">
        <button class="btn-busca" onclick="executarBusca()">Pesquisar</button>
    </div>
</div>

<div id="home-view">
    <div class="secao-tmdb">
        <div class="secao-header">
            <h2 class="secao-titulo">Os Mais Populares</h2>
            <div class="toggle-tmdb">
                <button class="toggle-btn active" id="btn-pop-movie" onclick="trocarLista('popular', 'movie', 'carrossel-pop', 'btn-pop-movie', 'btn-pop-tv')">Filmes</button>
                <button class="toggle-btn" id="btn-pop-tv" onclick="trocarLista('popular', 'tv', 'carrossel-pop', 'btn-pop-tv', 'btn-pop-movie')">Séries</button>
            </div>
        </div>
        <div class="carrossel-wrapper">
            <button class="seta-carrossel seta-esq" onclick="rolarCarrossel('carrossel-pop', -1)">&#10094;</button>
            <div class="carrossel drag-scroll" id="carrossel-pop"></div>
            <button class="seta-carrossel seta-dir" onclick="rolarCarrossel('carrossel-pop', 1)">&#10095;</button>
        </div>
    </div>

    <div class="secao-tmdb">
        <div class="secao-header">
            <h2 class="secao-titulo">Próximas Estreias</h2>
        </div>
        <div class="carrossel-wrapper">
            <button class="seta-carrossel seta-esq" onclick="rolarCarrossel('carrossel-upcoming', -1)">&#10094;</button>
            <div class="carrossel drag-scroll" id="carrossel-upcoming"></div>
            <button class="seta-carrossel seta-dir" onclick="rolarCarrossel('carrossel-upcoming', 1)">&#10095;</button>
        </div>
    </div>

    <div class="secao-tmdb">
        <div class="secao-header">
            <h2 class="secao-titulo">Em Cartaz</h2>
        </div>
        <div class="carrossel-wrapper">
            <button class="seta-carrossel seta-esq" onclick="rolarCarrossel('carrossel-cartaz', -1)">&#10094;</button>
            <div class="carrossel drag-scroll" id="carrossel-cartaz"></div>
            <button class="seta-carrossel seta-dir" onclick="rolarCarrossel('carrossel-cartaz', 1)">&#10095;</button>
        </div>
    </div>

    <div class="secao-tmdb">
        <div class="secao-header">
            <h2 class="secao-titulo">Popular Awards</h2>
            <div class="toggle-tmdb">
                <button class="toggle-btn active" id="btn-awards-movie" onclick="trocarLista('top_rated', 'movie', 'carrossel-awards', 'btn-awards-movie', 'btn-awards-tv')">Filmes</button>
                <button class="toggle-btn" id="btn-awards-tv" onclick="trocarLista('top_rated', 'tv', 'carrossel-awards', 'btn-awards-tv', 'btn-awards-movie')">Séries</button>
            </div>
        </div>
        <div class="carrossel-wrapper">
            <button class="seta-carrossel seta-esq" onclick="rolarCarrossel('carrossel-awards', -1)">&#10094;</button>
            <div class="carrossel drag-scroll" id="carrossel-awards"></div>
            <button class="seta-carrossel seta-dir" onclick="rolarCarrossel('carrossel-awards', 1)">&#10095;</button>
        </div>
    </div>
</div>

<div id="busca-view">
    <button class="btn-voltar" onclick="fecharBusca()">← Voltar para Home</button>
    <h2 id="titulo-busca" style="margin-top: 0;">Resultados da Busca</h2>
    <div class="grid-busca" id="grid-resultados"></div>
</div>

<nav class="nav-bottom">
    <a href="index.html" class="active"><span class="nav-icon">🔍</span>Home</a>
    <a href="library.html"><span class="nav-icon">📖</span>Library</a>
    <a href="calendario.html"><span class="nav-icon">📅</span>Agenda</a>
    <a href="comunidade.html"><span class="nav-icon">👥</span>Social</a>
    <a href="perfil.html"><span class="nav-icon">⚙️</span>Perfil</a>
</nav>

<div id="modal-adicao" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModal()">&times;</span>
        <h2 id="modal-titulo" style="margin: 0 0 10px 0; color: #fff; font-size: 1.2rem; font-weight: 800; line-height: 1.2;">Título</h2>
        <div class="modal-form">
            <input type="hidden" id="modal-id-tmdb">
            <label>STATUS</label>
            <select id="modal-status"><option value="QUERO_VER">Quero Ver</option><option value="JA_VI">Já Vi</option><option value="ASSISTINDO">Assistindo</option><option value="ABANDONEI">Abandonei</option></select>
            <label>IDIOMA</label>
            <select id="modal-idioma"><option value="">Selecione...</option><option value="Dublado">🇧🇷 Dublado</option><option value="Legendado">💬 Legendado</option><option value="Original">🇺🇸 Áudio Original</option></select>
            <label>NOTA PESSOAL (0-5)</label>
            <input type="number" id="modal-nota" step="0.5" min="0" max="5" placeholder="Para o seu diário...">
            <label>TAGS</label>
            <input type="text" id="modal-tags" placeholder="Clássico, Plot Twist...">
            <label>REVIEW</label>
            <textarea id="modal-review" rows="3"></textarea>
            <button class="btn-salvar-modal" onclick="salvarNoDiario()">SALVAR NO DIÁRIO</button>
        </div>
    </div>
</div>

<script>
    const dadosUser = JSON.parse(localStorage.getItem('usuarioLogado'));
    if (dadosUser && dadosUser.corTema) { document.documentElement.style.setProperty('--cor-primaria', dadosUser.corTema); }
    if (!dadosUser) window.location.href = 'login.html';

    const placeholderImagem = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='500' height='750' style='background:%231b2228'%3E%3Ctext fill='%238c9baf' x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='24'%3ESem Foto%3C/text%3E%3C/svg%3E";

    window.onload = function() {
        carregarSecao('popular', 'movie', 'carrossel-pop');
        carregarSecao('upcoming', 'movie', 'carrossel-upcoming');
        carregarSecao('now_playing', 'movie', 'carrossel-cartaz');
        carregarSecao('top_rated', 'movie', 'carrossel-awards');
        ativarDragScroll();
    };

    function rolarCarrossel(idCarrossel, direcao) {
        const carrossel = document.getElementById(idCarrossel);
        const distancia = (carrossel.clientWidth - 100) * direcao;
        carrossel.scrollBy({ left: distancia, behavior: 'smooth' });
    }

    function ativarDragScroll() {
        const sliders = document.querySelectorAll('.drag-scroll');
        let isDown = false;
        let startX;
        let scrollLeft;

        sliders.forEach(slider => {
            slider.addEventListener('mousedown', (e) => {
                isDown = true;
                slider.classList.add('active');
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => { isDown = false; slider.classList.remove('active'); });
            slider.addEventListener('mouseup', () => { isDown = false; slider.classList.remove('active'); });
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2;
                slider.scrollLeft = scrollLeft - walk;
            });
        });
    }

    function formatarData(dataString) {
        if (!dataString) return '';
        const meses = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
        const partes = dataString.split('-');
        if (partes.length !== 3) return dataString;
        return `${partes[2]} de ${meses[parseInt(partes[1]) - 1]} de ${partes[0]}`;
    }

    function trocarLista(cat, tipo, containerId, btnAtivoId, btnInativoId) {
        document.getElementById(btnAtivoId).classList.add('active');
        document.getElementById(btnInativoId).classList.remove('active');
        carregarSecao(cat, tipo, containerId);
    }

    async function carregarSecao(cat, tipo, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '<p style="color: #8c9baf; padding: 20px;">Carregando...</p>';
        try {
            const response = await fetch(`/api/tmdb/lista?cat=${cat}&tipo=${tipo}`);
            let filmes = await response.json();

            if (cat === 'upcoming') {
                filmes.sort((a, b) => {
                    if (!a.dataExibicao) return 1;
                    if (!b.dataExibicao) return -1;
                    return new Date(a.dataExibicao) - new Date(b.dataExibicao);
                });
            }

            const filmesExibidos = filmes.slice(0, 20);
            let html = gerarHTMLCards(filmesExibidos);

            html += `
                <div class="card-ver-todos" onclick="window.location.href='lista_completa.html?cat=${cat}&tipo=${tipo}'">
                    <span class="seta-ver-todos">→</span>
                    <span class="texto-ver-todos">Ver todos</span>
                </div>
            `;

            container.innerHTML = html;
        } catch (e) { container.innerHTML = '<p style="color: red;">Erro ao carregar.</p>'; }
    }

    async function executarBusca() {
        const query = document.getElementById('input-busca').value;
        if (!query) return;

        document.getElementById('home-view').style.display = 'none';
        document.getElementById('busca-view').style.display = 'block';
        document.getElementById('titulo-busca').innerText = `Resultados para: "${query}"`;

        const grid = document.getElementById('grid-resultados');
        grid.innerHTML = '<p style="color: #8c9baf;">Buscando...</p>';

        const response = await fetch(`/api/tmdb/busca?titulo=${query}`);
        const filmes = await response.json();
        grid.innerHTML = gerarHTMLCards(filmes);
    }

    function fecharBusca() {
        document.getElementById('busca-view').style.display = 'none';
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('input-busca').value = '';
    }

    function gerarHTMLCards(filmes) {
        if(filmes.length === 0) return '<p style="color: #8c9baf;">Nenhum título encontrado.</p>';

        return filmes.map(filme => {
            let valorNota = filme.notaTmdb || filme.vote_average || filme.voteAverage || 0;
            const porcentagemNum = valorNota > 0 ? (valorNota * 10).toFixed(0) : 0;

            let corAnel = 'var(--cor-sucesso)';
            if (valorNota < 7) corAnel = 'var(--cor-alerta)';
            if (valorNota < 5 && valorNota > 0) corAnel = 'var(--cor-perigo)';
            if (valorNota === 0) corAnel = '#666';

            let conteudoNota = `<span class="nota-valor">NR</span>`;
            if (porcentagemNum > 0) {
                conteudoNota = `<span class="nota-valor">${porcentagemNum}</span><span class="simbolo-porcento">%</span>`;
            }

            const dataFormatada = formatarData(filme.dataExibicao);

            return `
                <div class="card-tmdb"
                     onmousedown="window.startX = event.pageX;"
                     onmouseup="if(Math.abs(event.pageX - window.startX) < 5) window.location.href='detalhes.html?id=${filme.id}'">
                    <div class="poster-container">
                        <img src="${filme.linkPoster ? filme.linkPoster : placeholderImagem}" alt="${filme.tituloExibicao}" onerror="this.src='${placeholderImagem}'" draggable="false">
                        <div class="nota-donut" style="--cor-anel: ${corAnel}; --progresso: ${porcentagemNum}%">
                            <span>${conteudoNota}</span>
                        </div>
                    </div>
                    <div class="info-container">
                        <h3 class="info-titulo" title="${filme.tituloExibicao}">${filme.tituloExibicao}</h3>
                        <p class="info-data">${dataFormatada}</p>
                    </div>
                </div>
            `;
        }).join('');
    }

    function abrirModalAdicao(idTmdb, titulo) {
        document.getElementById('modal-id-tmdb').value = idTmdb;
        document.getElementById('modal-titulo').innerText = titulo;
        document.getElementById('modal-status').value = "QUERO_VER";
        document.getElementById('modal-idioma').value = "";
        document.getElementById('modal-nota').value = "";
        document.getElementById('modal-tags').value = "";
        document.getElementById('modal-review').value = "";
        document.getElementById('modal-adicao').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modal-adicao').style.display = 'none'; }

    window.onclick = function(event) {
        if (event.target == document.getElementById('modal-adicao')) fecharModal();
    }

    async function salvarNoDiario() {
        const payload = {
            idFilmeTmdb: document.getElementById('modal-id-tmdb').value,
            status: document.getElementById('modal-status').value,
            idiomaAudio: document.getElementById('modal-idioma').value,
            nota: document.getElementById('modal-nota').value ? parseFloat(document.getElementById('modal-nota').value) : null,
            tags: document.getElementById('modal-tags').value,
            review: document.getElementById('modal-review').value
        };
        const response = await fetch(`/interacoes/usuario/${dadosUser.id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (response.ok) fecharModal();
    }
</script>
