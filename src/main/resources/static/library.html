<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Cinehub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-primaria: #800080;
            --cor-fundo: #14181c;
            --cor-card: #1b2228;
            --cor-texto: #ffffff;
            --cor-texto-sec: #8c9baf;
            --cor-sucesso: #21d07a;
            --cor-alerta: #d2d531;
            --cor-perigo: #db2360;
            --cor-ouro: #ffc107;
            --cor-borda: rgba(255, 255, 255, 0.1);
            --transicao: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--cor-fundo); color: var(--cor-texto);
            font-family: 'Inter', sans-serif; margin: 0; padding: 0 0 90px 0;
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* HEADER */
        .header-perfil { text-align: center; margin: 35px 0 25px; }
        h1 { margin: 0 0 5px; font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; text-transform: uppercase; color: #fff; }
        .subtitulo { color: var(--cor-texto-sec); font-size: 0.9rem; font-weight: 500; letter-spacing: 0.5px; }

        /* DASHBOARD GLASS */
        #dashboard {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            width: 95%; max-width: 1100px; padding: 20px;
            background: rgba(27, 34, 40, 0.5); backdrop-filter: blur(10px);
            border-radius: 16px; border: 1px solid var(--cor-borda); margin-bottom: 30px;
        }
        .stat-card { text-align: center; position: relative; }
        .stat-card:not(:last-child)::after {
            content: ''; position: absolute; right: -5px; top: 20%; height: 60%;
            width: 1px; background: rgba(255,255,255,0.1);
        }
        .stat-value { display: block; font-size: 1.5rem; font-weight: 900; color: #fff; line-height: 1.2; }
        .stat-label { font-size: 0.65rem; color: var(--cor-texto-sec); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* GRID */
        #lista-library {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
            padding: 10px 25px 40px; width: 100%; max-width: 1200px;
        }
        @media (min-width: 768px) { #lista-library { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; } }

        /* CARD LIBRARY PREMIUM */
        .card-library {
            display: flex; flex-direction: column; cursor: pointer; position: relative;
            border-radius: 10px; background-color: var(--cor-card);
            border: 1px solid rgba(255, 255, 255, 0.05); transition: var(--transicao);
            overflow: visible;
        }

        .card-library:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--cor-primaria);
            box-shadow: 0 12px 30px rgba(128, 0, 128, 0.4);
        }

        .poster-container { position: relative; width: 100%; }
        .poster-container img {
            width: 100%; aspect-ratio: 2/3; object-fit: cover;
            border-top-left-radius: 10px; border-top-right-radius: 10px; display: block;
        }

        .status-pill {
            position: absolute; top: 8px; right: 8px;
            padding: 3px 8px; border-radius: 4px; font-size: 0.55rem;
            font-weight: 900; letter-spacing: 0.5px; color: #fff;
            text-transform: uppercase; z-index: 5;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* NOTA OFICIAL (TMDB) NO PÔSTER */
        .nota-donut {
            position: absolute; bottom: -18px; left: 10px; width: 36px; height: 36px;
            background-color: #081c22; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 0.7rem; font-weight: 800; border: 3px solid; box-shadow: 0 0 0 2px #081c22;
        }
        .nota-donut span { font-size: 0.4rem; position: absolute; top: 10px; right: 4px; }

        /* INFO CONTAINER */
        .info-container { padding: 25px 12px 15px 12px; flex-grow: 1; display: flex; flex-direction: column; gap: 4px; }
        .info-titulo { font-size: 0.9rem; font-weight: 700; margin: 0; color: #fff; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* ESTRELAS PESSOAIS - DESIGN MEIA ESTRELA REAL */
        .estrelas-pessoais { color: var(--cor-ouro); font-size: 1.1rem; display: flex; align-items: center; gap: 2px; margin-top: 2px; }
        .estrela-wrapper { position: relative; display: inline-block; line-height: 1; }
        .estrela-fundo { color: rgba(255,255,255,0.15); }
        .estrela-cheia { position: absolute; top: 0; left: 0; overflow: hidden; white-space: nowrap; color: var(--cor-ouro); }
        .meia { width: 50%; } /* Define o corte de 50% */

        /* REVIEW SNIPPET */
        .review-snippet {
            font-size: 0.75rem; color: var(--cor-texto-sec); font-style: italic;
            margin-top: 5px; line-height: 1.3; display: -webkit-box;
            -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }

        .info-data { font-size: 0.75rem; color: var(--cor-texto-sec); font-weight: 500; margin-top: auto; padding-top: 8px; }

        /* NAV E MODAL */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; max-width: 600px; background: rgba(27, 34, 40, 0.9); backdrop-filter: blur(12px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--cor-borda); z-index: 1000; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        @media (min-width: 600px) { .nav-bottom { bottom: 20px; border-radius: 20px; border: 1px solid var(--cor-borda); } }
        .nav-bottom a { color: var(--cor-texto-sec); text-decoration: none; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: var(--transicao); }
        .nav-bottom a.active { color: var(--cor-primaria); }
        .nav-icon { font-size: 1.2rem; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--cor-card); width: 90%; max-width: 400px; padding: 30px; border-radius: 16px; border: 1px solid var(--cor-borda); animation: slideUp 0.3s ease; max-height: 90vh; overflow-y: auto;}
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-btn { float: right; font-size: 1.5rem; cursor: pointer; color: var(--cor-texto-sec); line-height: 1; transition: var(--transicao); }
        .close-btn:hover { color: #fff; }

        .modal-form label { font-size: 0.75rem; font-weight: 600; color: var(--cor-texto-sec); display: block; margin-bottom: 6px; letter-spacing: 0.5px; margin-top: 15px;}
        .modal-form select, .modal-form input, .modal-form textarea { background: #232a31; border: 1px solid #344150; color: white; padding: 10px 14px; border-radius: 6px; width: 100%; font-family: 'Inter', sans-serif; font-size: 0.95rem; }
        .modal-form select:focus, .modal-form input:focus, .modal-form textarea:focus { outline: none; border-color: var(--cor-primaria); background: #2c3440; }

        .botoes-acao { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .btn-salvar { background: var(--cor-sucesso); border: none; color: #000; padding: 16px; border-radius: 8px; font-weight: 800; width: 100%; cursor: pointer; transition: var(--transicao); letter-spacing: 0.5px; }
        .btn-salvar:hover { background: #00ff5f; transform: translateY(-2px); }
        .btn-remover { background: transparent; border: 1px solid var(--cor-perigo); color: var(--cor-perigo); padding: 12px; border-radius: 8px; font-weight: 700; width: 100%; cursor: pointer; transition: var(--transicao); }
        .btn-remover:hover { background: rgba(255, 77, 77, 0.1); }
    </style>
</head>
<body>

<div class="header-perfil">
    <h1 id="titulo-pagina">LIBRARY</h1>
    <p class="subtitulo" id="subtitulo-pagina">Sua coleção particular</p>
</div>

<div id="dashboard">
    <div class="stat-card">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">Vistos</span>
    </div>
    <div class="stat-card">
        <span class="stat-value" id="stat-ingles" style="color: var(--cor-sucesso)">0%</span>
        <span class="stat-label">Originais</span>
    </div>
    <div class="stat-card">
        <span class="stat-value" id="stat-nota">0.0</span>
        <span class="stat-label">Média</span>
    </div>
    <div class="stat-card">
        <span class="stat-value" id="stat-tag">-</span>
        <span class="stat-label">Top Tag</span>
    </div>
</div>

<div id="lista-library">
    <p style="text-align: center; width: 100%; color: var(--cor-texto-sec); grid-column: 1/-1;">Organizando sua galeria...</p>
</div>

<nav class="nav-bottom">
    <a href="index.html"><span class="nav-icon">🔍</span>Home</a>
    <a href="library.html" class="active"><span class="nav-icon">📖</span>Library</a>
    <a href="calendario.html"><span class="nav-icon">📅</span>Agenda</a>
    <a href="comunidade.html"><span class="nav-icon">👥</span>Social</a>
    <a href="perfil.html"><span class="nav-icon">⚙️</span>Perfil</a>
</nav>

<div id="modal-edicao" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModal()">&times;</span>
        <h2 id="modal-titulo" style="margin: 0 0 5px 0; color: #fff; font-size: 1.3rem; font-weight: 800; line-height: 1.2;">Título</h2>
        <div class="modal-form">
            <input type="hidden" id="modal-id-tmdb">
            <label>STATUS</label>
            <select id="modal-status">
                <option value="QUERO_VER">Quero Ver</option>
                <option value="JA_VI">Já Vi</option>
                <option value="ASSISTINDO">Assistindo</option>
                <option value="ABANDONEI">Abandonei</option>
            </select>
            <label>IDIOMA</label>
            <select id="modal-idioma">
                <option value="">Selecione...</option>
                <option value="Dublado">🇧🇷 Dublado</option>
                <option value="Legendado">💬 Legendado</option>
                <option value="Original">🇺🇸 Áudio Original</option>
            </select>
            <label>SUA NOTA (0-5)</label>
            <input type="number" id="modal-nota" step="0.5" min="0" max="5">
            <label>TAGS</label>
            <input type="text" id="modal-tags" placeholder="Clássico, Terror...">
            <label>SUA REVIEW</label>
            <textarea id="modal-review" rows="3"></textarea>
            <div class="botoes-acao" id="botoes-modal">
                <button class="btn-salvar" onclick="salvarEdicao()">ATUALIZAR LIBRARY</button>
                <button class="btn-remover" onclick="removerDoDiario()">REMOVER DA COLEÇÃO</button>
            </div>
        </div>
    </div>
</div>

<script>
    const dadosUser = JSON.parse(localStorage.getItem('usuarioLogado'));
    if (dadosUser && dadosUser.corTema) { document.documentElement.style.setProperty('--cor-primaria', dadosUser.corTema); }

    const dadosUsuario = JSON.parse(localStorage.getItem('usuarioLogado'));
    const urlParams = new URLSearchParams(window.location.search);
    const amigoId = urlParams.get('amigoId');
    const isVisita = amigoId !== null && amigoId !== dadosUsuario.id.toString();

    if (!dadosUsuario) window.location.href = 'login.html';

    window.onload = async () => {
        if (isVisita) await ajustarParaVisita();
        await carregarLibrary();
    };

    async function ajustarParaVisita() {
        try {
            const res = await fetch(`/usuarios/${amigoId}`);
            if (res.ok) {
                const amigo = await res.json();
                document.getElementById('titulo-pagina').innerText = `${amigo.nome.split(' ')[0]}'s LIBRARY`;
                document.getElementById('subtitulo-pagina').innerText = `@${amigo.nickname} - Visitando`;
            }
        } catch(e) { console.error(e); }
    }

    // --- FUNÇÃO PARA GERAR AS ESTRELAS COM MEIA ESTRELA REAL VIA CSS ---
    function gerarEstrelasHtml(nota) {
        if (!nota || nota === 0) return '<span style="color: var(--cor-texto-sec); font-size: 0.75rem;">Sem nota</span>';
        let html = '<div class="estrelas-pessoais">';
        for (let i = 1; i <= 5; i++) {
            html += `
                <div class="estrela-wrapper">
                    <span class="estrela-fundo">★</span>
                    <span class="estrela-cheia ${i <= Math.floor(nota) ? '' : (i === Math.ceil(nota) && nota % 1 !== 0 ? 'meia' : 'oculta')}"
                          style="${i > Math.ceil(nota) ? 'display:none' : ''}">★</span>
                </div>
            `;
        }
        html += '</div>';
        return html;
    }

    async function carregarLibrary() {
        const targetId = isVisita ? amigoId : dadosUsuario.id;
        const lista = document.getElementById('lista-library');

        try {
            const res = await fetch(`/interacoes/usuario/${targetId}`);
            const interacoes = await res.json();
            renderizarDashboard(interacoes);

            if (interacoes.length === 0) {
                lista.innerHTML = `<p style="text-align:center; width: 100%; color: var(--cor-texto-sec); grid-column: 1/-1;">Biblioteca vazia.</p>`;
                return;
            }
            lista.innerHTML = '';

            for (const i of interacoes) {
                const resF = await fetch(`/api/tmdb/${i.idFilmeTmdb}`);
                const f = await resF.json();

                // 1. NOTA OFICIAL DO SITE (TMDB) -> LER notaTmdb DO JAVA
                const valorTmdb = f.notaTmdb || f.vote_average || f.voteAverage || 0;
                const notaStr = valorTmdb > 0 ? (valorTmdb * 10).toFixed(0) : 'NR';

                let corAnel = 'var(--cor-sucesso)';
                if (valorTmdb < 7) corAnel = 'var(--cor-alerta)';
                if (valorTmdb < 5 && valorTmdb > 0) corAnel = 'var(--cor-perigo)';
                if (valorTmdb === 0) corAnel = '#666';

                // 2. SUA AVALIAÇÃO PESSOAL (ESTRELAS)
                const estrelasHtml = gerarEstrelasHtml(i.nota);

                // 3. SUA REVIEW (Snippet)
                const reviewTexto = i.review ? `"${i.review}"` : "";

                lista.innerHTML += `
                    <div class="card-library" onclick="abrirModal(${i.idFilmeTmdb}, '${f.tituloExibicao.replace(/'/g, "\\'")}', '${i.status}', '${i.nota||""}', '${(i.review||"").replace(/'/g, "\\'")}', '${(i.tags||"").replace(/'/g, "\\'")}', '${i.idiomaAudio||""}')">
                        <div class="status-pill">${i.status.replace('_', ' ')}</div>
                        <div class="poster-container">
                            <img src="${f.linkPoster || 'https://via.placeholder.com/500x750'}" onerror="this.src='https://via.placeholder.com/500x750'">
                            <div class="nota-donut" style="border-color: ${corAnel};">
                                ${notaStr === 'NR' ? 'NR' : notaStr + '<span>%</span>'}
                            </div>
                        </div>
                        <div class="info-container">
                            <h3 class="info-titulo">${f.tituloExibicao}</h3>
                            ${estrelasHtml}
                            <div class="review-snippet">${reviewTexto}</div>
                            <p class="info-data">${f.dataExibicao ? f.dataExibicao.split('-')[0] : 'N/A'}</p>
                        </div>
                    </div>
                `;
            }
        } catch (e) { console.error(e); }
    }

    function renderizarDashboard(interacoes) {
        const jaVi = interacoes.filter(i => i.status === 'JA_VI');
        document.getElementById('stat-total').innerText = jaVi.length;
        if (jaVi.length > 0) {
            const original = jaVi.filter(i => i.idiomaAudio === 'Original').length;
            document.getElementById('stat-ingles').innerText = ((original / jaVi.length) * 100).toFixed(0) + '%';
            const notas = jaVi.filter(i => i.nota != null);
            if (notas.length > 0) document.getElementById('stat-nota').innerText = (notas.reduce((a, b) => a + b.nota, 0) / notas.length).toFixed(1);
        }
        const tagsMap = {};
        interacoes.forEach(i => {
            if (i.tags) i.tags.split(',').forEach(tag => { const t = tag.trim(); tagsMap[t] = (tagsMap[t] || 0) + 1; });
        });
        const topTag = Object.keys(tagsMap).reduce((a, b) => tagsMap[a] > tagsMap[b] ? a : b, '-');
        document.getElementById('stat-tag').innerText = topTag.length > 8 ? topTag.substring(0, 8) + '..' : topTag;
    }

    function abrirModal(id, titulo, status, nota, review, tags, idioma) {
        document.getElementById('modal-id-tmdb').value = id;
        document.getElementById('modal-titulo').innerText = titulo;
        document.getElementById('modal-status').value = status;
        document.getElementById('modal-idioma').value = idioma;
        document.getElementById('modal-nota').value = nota;
        document.getElementById('modal-tags').value = tags;
        document.getElementById('modal-review').value = review;
        document.getElementById('botoes-modal').style.display = isVisita ? 'none' : 'flex';
        document.querySelectorAll('.modal-form input, .modal-form select, .modal-form textarea').forEach(el => el.disabled = isVisita);
        document.getElementById('modal-edicao').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modal-edicao').style.display = 'none'; }

    async function salvarEdicao() {
        const payload = {
            idFilmeTmdb: document.getElementById('modal-id-tmdb').value,
            status: document.getElementById('modal-status').value,
            idiomaAudio: document.getElementById('modal-idioma').value,
            nota: document.getElementById('modal-nota').value ? parseFloat(document.getElementById('modal-nota').value) : null,
            tags: document.getElementById('modal-tags').value,
            review: document.getElementById('modal-review').value
        };
        await fetch(`/interacoes/usuario/${dadosUsuario.id}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        fecharModal(); carregarLibrary();
    }

    async function removerDoDiario() {
        if (!confirm("Remover da biblioteca?")) return;
        await fetch(`/interacoes/usuario/${dadosUsuario.id}/filme/${document.getElementById('modal-id-tmdb').value}`, { method: 'DELETE' });
        fecharModal(); carregarLibrary();
    }
</script>
</body>
</html>
